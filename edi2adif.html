<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDI → ADIF Converter</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0a0e14;
  --bg2:    #0f1520;
  --bg3:    #162030;
  --bg4:    #1c2a3a;
  --border: #1e3048;
  --border2:#254060;
  --text:   #cdd9e5;
  --muted:  #637e96;
  --dim:    #3d5a70;
  --accent: #4d9de0;
  --accent2:#2ecc8a;
  --accent3:#f0a500;
  --danger: #e05c4d;
  --dup:    rgba(240,165,0,0.12);
  --hdr:    linear-gradient(135deg,#0a0e14 0%,#0d1a28 100%);
  --call:   #79c0ff;
  --r:      6px;
}
html[data-theme="light"] {
  --bg:     #f0f4f8;
  --bg2:    #ffffff;
  --bg3:    #e4ecf3;
  --bg4:    #d4e0eb;
  --border: #bfcfdd;
  --border2:#96b0c6;
  --text:   #18273a;
  --muted:  #4a6275;
  --dim:    #7a9ab0;
  --accent: #1a6fad;
  --accent2:#178a58;
  --accent3:#a06800;
  --danger: #c03030;
  --dup:    rgba(160,104,0,0.10);
  --hdr:    linear-gradient(135deg,#dde8f2 0%,#eaf2f8 100%);
  --call:   var(--accent);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:14px;min-height:100vh;transition:background-color .2s,color .2s}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* HEADER */
header{
  background:var(--hdr);
  border-bottom:1px solid var(--border);
  padding:.9rem 1.5rem;
  display:flex;align-items:center;gap:1rem;
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(8px);
}
.logo{font-family:'Space Mono',monospace;font-size:1rem;letter-spacing:-.02em}
.logo .arr{color:var(--accent);margin:0 .3rem}
.logo .fmt{color:var(--muted)}
.version{
  font-family:'Space Mono',monospace;font-size:10px;color:var(--dim);
  padding:1px 6px;border:1px solid var(--border);border-radius:3px;
  margin-left:-.2rem;white-space:nowrap;
}
.stats-bar{
  display:flex;gap:1.5rem;margin-left:1rem;
  font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;
}
.stat{display:flex;flex-direction:column;gap:1px}
.stat-val{color:var(--accent);font-weight:700;font-size:13px}
.lang-wrap{margin-left:auto;display:flex;gap:4px}
.lang-btn{background:transparent;border:1px solid var(--border);color:var(--muted);
  border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;cursor:pointer;
  transition:all .15s;font-family:'Space Mono',monospace}
.lang-btn.active{background:var(--bg4);border-color:var(--accent);color:var(--accent)}
.theme-btn{background:transparent;border:1px solid var(--border);color:var(--muted);
  border-radius:4px;padding:2px 7px;font-size:13px;cursor:pointer;line-height:1;
  transition:all .15s}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}

/* MAIN */
main{max-width:1500px;margin:0 auto;padding:1.25rem 1.5rem 3rem}

/* DROP */
#dropzone{
  min-height:calc(100vh - 60px);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1.25rem;padding:2rem;
}
.drop-area{
  border:1.5px dashed var(--border2);border-radius:12px;
  padding:3rem 5rem;text-align:center;cursor:pointer;
  transition:all .2s;background:var(--bg2);max-width:500px;width:100%;
}
.drop-area:hover,.drop-area.drag{border-color:var(--accent);background:rgba(77,157,224,.05)}
.drop-ico{font-size:2.5rem;margin-bottom:.75rem;opacity:.7}
.drop-title{font-family:'Space Mono',monospace;font-size:.95rem;margin-bottom:.4rem}
.drop-sub{font-size:.8rem;color:var(--muted);margin-bottom:1rem}
.btn{border:none;border-radius:var(--r);padding:.45rem 1.1rem;font-size:.8rem;
  font-weight:600;cursor:pointer;transition:all .15s;font-family:'IBM Plex Sans',sans-serif}
.btn-primary{background:var(--accent);color:#0a0e14}
.btn-primary:hover{opacity:.85}
.btn-secondary{background:var(--bg4);color:var(--text);border:1px solid var(--border2)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-green{background:var(--accent2);color:#0a0e14}
.btn-green:hover{opacity:.85}
.btn-orange{background:var(--accent3);color:#0a0e14}
.btn-orange:hover{opacity:.85}
.btn-sm{padding:.3rem .8rem;font-size:.75rem}
.drop-note{font-size:.75rem;color:var(--dim);max-width:440px;text-align:center;line-height:1.6}
#fileInput{display:none}

/* APP */
#app{display:none}

/* TOOLBAR */
.toolbar{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:.8rem 1rem;margin-bottom:1rem;
  display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;
}
.toolbar-sep{width:1px;height:20px;background:var(--border);margin:0 .2rem}
.search-inp{
  background:var(--bg3);border:1px solid var(--border2);border-radius:4px;
  color:var(--text);padding:.35rem .7rem;font-size:.8rem;width:180px;
  font-family:'IBM Plex Sans',sans-serif;
}
.search-inp:focus{outline:none;border-color:var(--accent)}
.sel{
  background:var(--bg3);border:1px solid var(--border2);border-radius:4px;
  color:var(--text);padding:.35rem .6rem;font-size:.8rem;cursor:pointer;
}
.file-tags{display:flex;gap:.4rem;flex-wrap:wrap;margin-left:.4rem}
.file-tag{
  background:var(--bg4);border:1px solid var(--border2);border-radius:3px;
  padding:2px 8px;font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;
  display:flex;align-items:center;gap:4px;
}
.file-tag-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.row-count{font-size:11px;color:var(--dim);margin-left:auto;font-family:'Space Mono',monospace;white-space:nowrap}

/* EXPORT BAR */
.export-bar{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:.8rem 1rem;margin-bottom:1rem;
  display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;
}
.export-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-right:.25rem}

/* TABLE */
.tbl-wrap{overflow:auto;border:1px solid var(--border);border-radius:var(--r);background:var(--bg2)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{position:sticky;top:0;z-index:2}
th{
  background:var(--bg3);border-bottom:1px solid var(--border2);
  padding:.5rem .7rem;text-align:left;white-space:nowrap;
  font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;
  cursor:pointer;user-select:none;transition:color .1s;
}
th:hover{color:var(--accent)}
th.sorted{color:var(--accent)}
th .sort-ico{margin-left:4px;opacity:.5;font-size:9px}
th.sorted .sort-ico{opacity:1}
td{
  padding:.45rem .7rem;border-bottom:.5px solid var(--border);
  color:var(--text);white-space:nowrap;vertical-align:middle;
}
td.call{font-family:'Space Mono',monospace;font-weight:700;color:var(--call)}
td.num {font-family:'Space Mono',monospace;color:var(--dim);font-size:11px}
td.loc {font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)}
td.dist{font-family:'Space Mono',monospace;font-size:11px;color:var(--accent2)}
td.band{font-family:'Space Mono',monospace}
td.src {font-size:10px;color:var(--dim);max-width:120px;overflow:hidden;text-overflow:ellipsis}
tr:last-child td{border-bottom:none}
tr.dup{background:var(--dup)}
tr.dup td.call{color:var(--accent3)}
tr:hover td{background:rgba(77,157,224,.04)}
tr.desel td{opacity:.35}
.badge{display:inline-block;font-size:9px;padding:1px 5px;border-radius:2px;
  font-family:'Space Mono',monospace;vertical-align:middle}
.badge-ssb{background:rgba(77,157,224,.2);color:var(--call)}
.badge-cw {background:rgba(46,204,138,.2);color:#3fb950}
.badge-fm {background:rgba(240,165,0,.2);color:var(--accent3)}
.badge-band{background:rgba(99,126,150,.2);color:var(--muted)}
.badge-dup {background:rgba(240,165,0,.25);color:var(--accent3);margin-left:4px}
.badge-digi{background:rgba(163,113,247,.2);color:#a371f7}
.chk{accent-color:var(--accent);width:13px;height:13px;cursor:pointer}

/* EDITABLE CELLS */
td.editable{cursor:text;transition:background .1s}
td.editable:hover{background:rgba(77,157,224,.07)!important;outline:1px dashed var(--border2)}
td.editing{background:rgba(77,157,224,.1)!important;outline:1px solid var(--accent)}
.cell-inp{
  background:transparent;border:none;outline:none;
  color:inherit;padding:0;font-size:12px;font-family:'Space Mono',monospace;
  width:100%;box-sizing:border-box;
}
.cell-sel{
  background:var(--bg3);border:none;outline:none;cursor:pointer;
  color:inherit;font-size:11px;font-family:'Space Mono',monospace;
}

/* TOAST */
#toast{
  position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;
  background:var(--bg3);border:1px solid var(--accent2);border-radius:var(--r);
  padding:.6rem 1rem;font-size:.8rem;color:var(--accent2);
  transform:translateY(100px);opacity:0;transition:all .3s;pointer-events:none;
  font-family:'Space Mono',monospace;
}
#toast.show{transform:translateY(0);opacity:1}
#toast.err{border-color:var(--danger);color:var(--danger)}
</style>
</head>
<body>

<header>
  <div class="logo">EDI<span class="arr">→</span>ADIF<span class="fmt"> converter</span></div>
  <span class="version">v1.0</span>
  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat"><span class="stat-val" id="sSrc">0</span><span data-i18n="statFiles">datotek</span></div>
    <div class="stat"><span class="stat-val" id="sQso">0</span>QSO</div>
    <div class="stat"><span class="stat-val" id="sBands">—</span><span data-i18n="statBands">pasovi</span></div>
    <div class="stat"><span class="stat-val" id="sDates">—</span><span data-i18n="statDates">obdobje</span></div>
  </div>
  <div class="lang-wrap">
    <button class="theme-btn" id="btnTheme" onclick="toggleTheme()" title="Toggle theme">☀</button>
    <button class="lang-btn active" id="btnSL" onclick="setLang('sl')">SL</button>
    <button class="lang-btn" id="btnEN" onclick="setLang('en')">EN</button>
  </div>
</header>

<div id="dropzone">
  <div class="drop-area" id="dropArea">
    <div class="drop-ico">📡</div>
    <div class="drop-title" data-i18n="dropTitle">Naloži EDI dnevnike</div>
    <div class="drop-sub" data-i18n="dropSub">povleci eno ali več .edi datotek</div>
    <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()" data-i18n="dropBtn">Izberi datoteke</button>
  </div>
  <div class="drop-note" data-i18n="dropNote">Podpira REG1TEST EDI v1. Več datotek se združi v en ADIF. Obdelava poteka lokalno v brskalniku.</div>
  <input type="file" id="fileInput" multiple accept=".edi,.EDI">
</div>

<main id="app">
  <div class="toolbar">
    <button class="btn btn-secondary btn-sm" onclick="document.getElementById('fileInput').click()" data-i18n="btnAdd">+ Dodaj datoteke</button>
    <button class="btn btn-secondary btn-sm" onclick="resetApp()" data-i18n="btnReset">↩ Ponastavi</button>
    <div class="toolbar-sep"></div>
    <input class="search-inp" id="searchInp" placeholder="Išči klicni znak…" oninput="applyFilters()">
    <select class="sel" id="filterBand" onchange="applyFilters()"><option value="">— pas —</option></select>
    <select class="sel" id="filterMode" onchange="applyFilters()"><option value="">— način —</option></select>
    <select class="sel" id="filterSrc"  onchange="applyFilters()"><option value="">— datoteka —</option></select>
    <div class="toolbar-sep"></div>
    <label style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;cursor:pointer">
      <input type="checkbox" id="hideDups" class="chk" onchange="applyFilters()">
      <span data-i18n="hideDups">Skrij duplikate</span>
    </label>
    <div class="file-tags" id="fileTags"></div>
    <div class="row-count" id="rowCount"></div>
  </div>

  <div class="export-bar">
    <span class="export-label" data-i18n="exportLabel">Izvoz</span>
    <button class="btn btn-primary btn-sm" onclick="exportADIF()" data-i18n="btnAdif">⬇ ADIF (.adi)</button>
    <button class="btn btn-green btn-sm" onclick="exportLoTW()" data-i18n="btnLotw">⬇ LoTW ADIF</button>
    <button class="btn btn-orange btn-sm" onclick="exportDARC()" data-i18n="btnDarc">⬇ DARC QSL CSV</button>
    <button class="btn btn-orange btn-sm" onclick="exportQSLShop()" data-i18n="btnQslShop">⬇ qslshop.de</button>
    <button class="btn btn-secondary btn-sm" onclick="exportCSV()" data-i18n="btnCsv">⬇ CSV</button>
    <div class="toolbar-sep"></div>
    <label style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;cursor:pointer">
      <input type="checkbox" id="onlySelected" class="chk" onchange="updateExportCount()">
      <span data-i18n="onlySel">Samo označene</span>
    </label>
    <span id="exportCount" style="font-size:11px;color:var(--dim);font-family:'Space Mono',monospace"></span>
  </div>

  <div class="tbl-wrap">
    <table id="mainTable">
      <thead id="tHead"></thead>
      <tbody id="tBody"></tbody>
    </table>
  </div>
</main>

<div id="toast"></div>

<script>
// ════════════════════════════════════════
//  I18N
// ════════════════════════════════════════
const S = {
sl:{
  dropTitle:'Naloži EDI dnevnike', dropSub:'povleci eno ali več .edi datotek',
  dropBtn:'Izberi datoteke', dropNote:'Podpira REG1TEST EDI v1. Več datotek se združi v en ADIF. Obdelava poteka lokalno v brskalniku.',
  statFiles:'datotek', statBands:'pasovi', statDates:'obdobje',
  btnAdd:'+ Dodaj datoteke', btnReset:'↩ Ponastavi',
  hideDups:'Skrij duplikate', exportLabel:'Izvoz',
  btnAdif:'⬇ ADIF (.adi)', btnLotw:'⬇ LoTW ADIF', btnDarc:'⬇ DARC QSL CSV',
  onlySel:'Samo označene',
  thNum:'#', thDate:'Datum', thTime:'Čas', thCall:'Klicni znak',
  thBand:'Pas', thMode:'Način', thRstS:'RST oddano', thRstR:'RST sprejeto',
  thLoc:'Spr. lok.', thMyLoc:'Odd. lok.', thDist:'Razdalja', thSrc:'Datoteka',
  btnCsv:'⬇ CSV', toastCsv:'CSV izvožen',
  btnQslShop:'⬇ qslshop.de', toastQslShop:'qslshop.de ADIF izvožen',
  toastAdif:'ADIF izvožen', toastLotw:'LoTW ADIF izvožen', toastDarc:'DARC CSV izvožen',
  toastNoQso:'Ni zvez za izvoz', errEdi:'Napaka pri branju EDI',
  dupLabel:'DUP', editHint:'Klikni za urejanje',
  errDate:'Napačen datum (PP.MM.LLLL)', errTime:'Napačen čas (HH:MM)',
  errCall:'Napačen klicni znak', errLoc:'Napačen lokator — počiščen',
},
en:{
  dropTitle:'Load EDI Logs', dropSub:'drag one or more .edi files',
  dropBtn:'Choose files', dropNote:'Supports REG1TEST EDI v1. Multiple files are merged into one ADIF. Processing is local in your browser.',
  statFiles:'files', statBands:'bands', statDates:'period',
  btnAdd:'+ Add files', btnReset:'↩ Reset',
  hideDups:'Hide duplicates', exportLabel:'Export',
  btnAdif:'⬇ ADIF (.adi)', btnLotw:'⬇ LoTW ADIF', btnDarc:'⬇ DARC QSL CSV',
  onlySel:'Selected only',
  thNum:'#', thDate:'Date', thTime:'Time', thCall:'Callsign',
  thBand:'Band', thMode:'Mode', thRstS:'RST Sent', thRstR:'RST Rcvd',
  thLoc:'Rcvd Loc.', thMyLoc:'Sent Loc.', thDist:'Distance', thSrc:'File',
  btnCsv:'⬇ CSV', toastCsv:'CSV exported',
  btnQslShop:'⬇ qslshop.de', toastQslShop:'qslshop.de ADIF exported',
  toastAdif:'ADIF exported', toastLotw:'LoTW ADIF exported', toastDarc:'DARC CSV exported',
  toastNoQso:'No QSOs to export', errEdi:'EDI read error',
  dupLabel:'DUP', editHint:'Click to edit',
  errDate:'Invalid date (DD.MM.YYYY)', errTime:'Invalid time (HH:MM)',
  errCall:'Invalid callsign', errLoc:'Invalid locator — cleared',
}};
let _lang='sl';
function t(k){return (S[_lang]||S.sl)[k]||(S.sl[k]||k)}
function setLang(l){
  _lang=l;
  document.getElementById('btnSL').classList.toggle('active',l==='sl');
  document.getElementById('btnEN').classList.toggle('active',l==='en');
  document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));
  if(document.getElementById('app').style.display!=='none') renderTable();
}

// ════════════════════════════════════════
//  BAND MAPPING
// ════════════════════════════════════════
const BAND_MAP = [
  [/50\s*MHz|^6m$/i,                             '6m',     50.2   ],
  [/144|145|^2m$/i,                              '2m',     144.3  ],
  [/432|430|^70\s*cm$/i,                         '70cm',   432.2  ],
  [/1[,.]2[0-9]*\s*GHz|1[,.]3[0-9]*\s*GHz|1296|^23\s*cm$/i, '23cm', 1296.1],
  [/2[,.]3[0-9]*\s*GHz|2320|^13\s*cm$/i,        '13cm',   2320.1 ],
  [/3[,.]4[0-9]*\s*GHz|3400|^9\s*cm$/i,         '9cm',    3400.1 ],
  [/5[,.]7[0-9]*\s*GHz|5760|^6\s*cm$/i,         '6cm',    5760.1 ],
  [/^10\s*GHz$|10[,.]3[0-9]*\s*GHz|10368|^3\s*cm$/i, '3cm', 10368.1],
  [/24[,.]0[0-9]*\s*GHz|24048|1[,.]25?\s*cm/i,  '1.25cm', 24048.1],
  [/^24\s*GHz$/i,                                '1.25cm', 24048.1],
  [/47\s*GHz/i,                                  '6mm',    47000.1],
];
const BANDS=BAND_MAP.map(e=>e[1]);
function normBand(s){
  if(!s) return {band:'',freq:''};
  for(const [re,band,freq] of BAND_MAP)
    if(re.test(s.trim())) return {band,freq};
  return {band:s.trim(),freq:''};
}

// ════════════════════════════════════════
//  EDI PARSER
// ════════════════════════════════════════
function parseEDI(text, filename){
  const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  const h={};
  const qsos=[];
  let section='';
  for(const raw of lines){
    const line=raw.trim();
    if(!line) continue;
    if(line.startsWith('[')){section=line.toLowerCase();continue;}
    if(section.startsWith('[qsorecords')){
      const p=line.split(';');
      if(p.length<10) continue;
      const dateRaw=p[0].trim();
      const timeRaw=p[1].trim();
      const call=(p[2]||'').trim().toUpperCase();
      if(!call||call==='ERROR') continue;
      const modeNum=parseInt(p[3])||1;
      const rstS=(p[4]||'').trim();
      const stx=(p[5]||'').trim();
      const rstR=(p[6]||'').trim();
      const srx=(p[7]||'').trim();
      const exch=(p[8]||'').trim();
      const wwlRaw=(p[9]||'').trim().toUpperCase();
      // Maidenhead convention: field designator uppercase, subsquare lowercase (JN65ar)
      const wwl=wwlRaw.length===6?wwlRaw.slice(0,4)+wwlRaw.slice(4).toLowerCase():wwlRaw;
      const dist=parseInt(p[10])||0;
      const dupeFlag=(p[13]||'').trim().toUpperCase()==='D';

      // Date: YYMMDD → YYYYMMDD
      let yy=parseInt(dateRaw.substring(0,2));
      const mm=dateRaw.substring(2,4);
      const dd=dateRaw.substring(4,6);
      const yyyy=(yy>=90?1900+yy:2000+yy);

      const hh=timeRaw.substring(0,2);
      const mi=timeRaw.substring(2,4);

      // REG1TEST mode codes (confirmed: adi2edi Rust tool + M1GEO Python tool)
      const mode=['','SSB','CW','CW','SSB','AM','FM','RTTY','SSTV','ATV'][modeNum]||'SSB';

      // Validate locator (6-char maidenhead)
      const locValid=/^[A-R]{2}[0-9]{2}[A-X]{2}$/i.test(wwl);

      qsos.push({
        call, mode, rstS, rstR, stx, srx, exch,
        wwl: locValid?wwl:'',
        dist, dupe:dupeFlag,
        date:`${yyyy}${mm}${dd}`,
        time:`${hh}${mi}`,
        dateDisp:`${dd}.${mm}.${yyyy}`,
        timeDisp:`${hh}:${mi}`,
        src:filename,
        _key:`${call}|${yyyy}${mm}${dd}|${hh}${mi}`, // for dup detection (band added later)
      });
    } else {
      const eq=line.indexOf('=');
      if(eq>0) h[line.substring(0,eq).toLowerCase()]=line.substring(eq+1).trim();
    }
  }
  const {band,freq}=normBand(h['pband']||'');
  return {header:h, band, freq, qsos};
}

// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
let _all=[];       // all QSO objects
let _filtered=[];  // after filter
let _sortCol=1;    // 0-based column index
let _sortAsc=true;
const FILE_COLORS=['#4d9de0','#2ecc8a','#f0a500','#e05c4d','#a371f7','#79c0ff'];

// ════════════════════════════════════════
//  FILE LOADING
// ════════════════════════════════════════
let _sources=[];  // {name, color, header, band, freq}

function handleFiles(files){
  let loaded=0;
  Array.from(files).forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{
      try{
        const {header,band,freq,qsos}=parseEDI(e.target.result,f.name);
        const color=FILE_COLORS[_sources.length%FILE_COLORS.length];
        _sources.push({name:f.name,color,header,band,freq});
        // Tag each QSO with band/freq from header + full dup key
        qsos.forEach(q=>{
          q.band=band; q.freq=freq;
          q.myCall=(header['pcall']||'').toUpperCase();
          q.myLoc=(header['pwwlo']||'').toUpperCase();
          q.contest=(header['tname']||'');
          q.pwr=(header['spowe']||'');
          q.ant=(header['sante']||'');
          q.txeq=(header['stxeq']||'');
          q.rxeq=(header['srxeq']||'');
          q.ops=[header['mope1'],header['mope2']].filter(Boolean).join(', ');
          q._bandKey=`${q._key}|${band}`;
        });
        _all.push(...qsos);
        loaded++;
        if(loaded===files.length) finishLoad();
      }catch(err){
        showToast(t('errEdi')+': '+f.name,true);
        loaded++;
        if(loaded===files.length) finishLoad();
      }
    };
    r.readAsText(f,'utf-8');
  });
}

function finishLoad(){
  // Assign stable row index (needed for # column sort)
  _all.forEach((q,i)=>q._idx=i);
  // Mark duplicates: same call+date+time+band = dup, keep first
  const seen=new Set();
  _all.forEach(q=>{
    if(seen.has(q._bandKey)){q.dupe=true;}
    else{seen.add(q._bandKey);}
  });
  document.getElementById('dropzone').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('statsBar').style.display='flex';
  updateStats();
  buildFilters();
  rebuildFileTags();
  applyFilters();
}

function updateStats(){
  document.getElementById('sSrc').textContent=_sources.length;
  document.getElementById('sQso').textContent=_all.length;
  const bands=[...new Set(_all.map(q=>q.band).filter(Boolean))].join(' · ');
  document.getElementById('sBands').textContent=bands||'—';
  if(_all.length){
    const dates=_all.map(q=>q.date).sort();
    const d0=dates[0], d1=dates[dates.length-1];
    const fmt=d=>`${d.substring(6,8)}.${d.substring(4,6)}.${d.substring(0,4)}`;
    document.getElementById('sDates').textContent=d0===d1?fmt(d0):`${fmt(d0)}–${fmt(d1)}`;
  }
}

function buildFilters(){
  const bands=[...new Set(_all.map(q=>q.band).filter(Boolean))].sort();
  const modes=[...new Set(_all.map(q=>q.mode).filter(Boolean))].sort();
  const srcs=[...new Set(_all.map(q=>q.src))];
  const bSel=document.getElementById('filterBand');
  const mSel=document.getElementById('filterMode');
  const sSel=document.getElementById('filterSrc');
  [bSel,mSel,sSel].forEach(s=>{while(s.options.length>1)s.remove(1)});
  bands.forEach(b=>{const o=new Option(b,b);bSel.add(o)});
  modes.forEach(m=>{const o=new Option(m,m);mSel.add(o)});
  srcs.forEach(s=>{const o=new Option(s,s);sSel.add(o)});
}

function rebuildFileTags(){
  const wrap=document.getElementById('fileTags');
  wrap.innerHTML=_sources.map(s=>
    `<div class="file-tag"><span class="file-tag-dot" style="background:${s.color}"></span>${htmlEsc(s.name)}</div>`
  ).join('');
}

// ════════════════════════════════════════
//  FILTER + SORT
// ════════════════════════════════════════
function applyFilters(){
  const q=(document.getElementById('searchInp').value||'').toUpperCase().trim();
  const band=document.getElementById('filterBand').value;
  const mode=document.getElementById('filterMode').value;
  const src=document.getElementById('filterSrc').value;
  const hideDups=document.getElementById('hideDups').checked;
  _filtered=_all.filter(r=>{
    if(q && !r.call.includes(q)) return false;
    if(band && r.band!==band) return false;
    if(mode && r.mode!==mode) return false;
    if(src  && r.src!==src)   return false;
    if(hideDups && r.dupe)    return false;
    return true;
  });
  sortFiltered();
  renderTable();
  updateExportCount();
}

const COL_KEYS=['_idx','dateDisp','timeDisp','call','band','mode','rstS','rstR','wwl','myLoc','dist','src'];
function sortFiltered(){
  const k=COL_KEYS[_sortCol];
  _filtered.sort((a,b)=>{
    let va=a[k]??'', vb=b[k]??'';
    if(k==='dist'){va=+va;vb=+vb;}
    else if(k==='dateDisp'||k==='timeDisp'){
      // sort by raw date/time
      va=k==='dateDisp'?a.date:a.time;
      vb=k==='dateDisp'?b.date:b.time;
    }
    const r=va<vb?-1:va>vb?1:0;
    return _sortAsc?r:-r;
  });
}

// ════════════════════════════════════════
//  TABLE RENDER
// ════════════════════════════════════════
function renderTable(){
  // Build header
  const cols=[
    {k:'_idx',   i18n:'thNum'},
    {k:'dateDisp',i18n:'thDate'},
    {k:'timeDisp',i18n:'thTime'},
    {k:'call',   i18n:'thCall'},
    {k:'band',   i18n:'thBand'},
    {k:'mode',   i18n:'thMode'},
    {k:'rstS',   i18n:'thRstS'},
    {k:'rstR',   i18n:'thRstR'},
    {k:'wwl',    i18n:'thLoc'},
    {k:'myLoc',  i18n:'thMyLoc'},
    {k:'dist',   i18n:'thDist'},
    {k:'src',    i18n:'thSrc'},
  ];
  const thead=document.getElementById('tHead');
  thead.innerHTML=`<tr>
    <th><input type="checkbox" class="chk" id="chkAll" onchange="toggleAll(this.checked)"></th>
    ${cols.map((c,i)=>`<th class="${_sortCol===i?'sorted':''}" onclick="setSort(${i})">
      ${t(c.i18n)}<span class="sort-ico">${_sortCol===i?(_sortAsc?'▲':'▼'):'⇅'}</span>
    </th>`).join('')}
  </tr>`;

  const tbody=document.getElementById('tBody');
  const rows=[];
  _filtered.forEach((q,idx)=>{
    const srcColor=(_sources.find(s=>s.name===q.src)||{}).color||'var(--dim)';
    const bk=htmlEsc(q._bandKey);
    rows.push(`<tr class="${q.dupe?'dup':''}" data-key="${bk}">
      <td><input type="checkbox" class="chk row-chk" data-key="${bk}"
        ${_desel.has(q._bandKey)?'':'checked'} onchange="toggleRow(this)"></td>
      <td class="num">${idx+1}</td>
      <td class="editable" title="${t('editHint')}" onclick="startEdit(this,${q._idx},'dateDisp')">${htmlEsc(q.dateDisp)}</td>
      <td class="num editable" title="${t('editHint')}" onclick="startEdit(this,${q._idx},'timeDisp')">${htmlEsc(q.timeDisp)}</td>
      <td class="call editable" title="${t('editHint')}" onclick="startEdit(this,${q._idx},'call')">${htmlEsc(q.call)}${q.dupe?`<span class="badge badge-dup">${t('dupLabel')}</span>`:''}</td>
      <td class="band editable" title="${t('editHint')}" onclick="startEdit(this,${q._idx},'band')"><span class="badge badge-band">${htmlEsc(q.band||'?')}</span></td>
      <td class="editable" title="${t('editHint')}" onclick="startEdit(this,${q._idx},'mode')"><span class="badge ${modeBadge(q.mode)}">${htmlEsc(q.mode)}</span></td>
      <td class="editable" title="${t('editHint')}" onclick="startEdit(this,${q._idx},'rstS')">${htmlEsc(q.rstS)}</td>
      <td class="editable" title="${t('editHint')}" onclick="startEdit(this,${q._idx},'rstR')">${htmlEsc(q.rstR)}</td>
      <td class="loc editable" title="${t('editHint')}" onclick="startEdit(this,${q._idx},'wwl')">${htmlEsc(q.wwl)||'—'}</td>
      <td class="loc editable" title="${t('editHint')}" onclick="startEdit(this,${q._idx},'myLoc')">${htmlEsc(q.myLoc)||'—'}</td>
      <td class="dist">${q.dist?q.dist+' km':'—'}</td>
      <td class="src" title="${htmlEsc(q.src)}"><span style="color:${srcColor}">●</span> ${htmlEsc(q.src)}</td>
    </tr>`);
  });
  tbody.innerHTML=rows.join('');
  document.getElementById('rowCount').textContent=`${_filtered.length} / ${_all.length} QSO`;
  // sync chkAll
  const allChk=document.getElementById('chkAll');
  if(allChk) allChk.checked=_desel.size===0;
}

const _desel=new Set(); // deselected band keys
function toggleAll(checked){
  _desel.clear();
  if(!checked) _all.forEach(q=>_desel.add(q._bandKey));
  renderTable(); updateExportCount();
}
function toggleRow(cb){
  const k=cb.dataset.key;
  if(cb.checked) _desel.delete(k); else _desel.add(k);
  updateExportCount();
}
function setSort(i){
  if(_sortCol===i) _sortAsc=!_sortAsc;
  else{_sortCol=i;_sortAsc=true;}
  sortFiltered(); renderTable();
}

function updateExportCount(){
  const onlySel=document.getElementById('onlySelected').checked;
  const pool=onlySel?_filtered.filter(q=>!_desel.has(q._bandKey)&&!q.dupe):_all.filter(q=>!_desel.has(q._bandKey)&&!q.dupe);
  document.getElementById('exportCount').textContent=`(${pool.length} QSO)`;
}

// ════════════════════════════════════════
//  ADIF HELPERS
// ════════════════════════════════════════
function adifField(tag,val){
  if(val===null||val===undefined||val==='') return '';
  const s=String(val);
  return `<${tag.toUpperCase()}:${s.length}>${s} `;
}

function adifTimestamp(){
  const n=new Date();
  const p=x=>String(x).padStart(2,'0');
  return `${n.getUTCFullYear()}${p(n.getUTCMonth()+1)}${p(n.getUTCDate())} ${p(n.getUTCHours())}${p(n.getUTCMinutes())}${p(n.getUTCSeconds())}`;
}

function getExportPool(){
  const onlySel=document.getElementById('onlySelected').checked;
  const base=onlySel?_filtered:_all;
  return base.filter(q=>!_desel.has(q._bandKey)&&!q.dupe);
}

// ════════════════════════════════════════
//  EXPORT: FULL ADIF
// ════════════════════════════════════════
function exportADIF(){
  const pool=getExportPool();
  if(!pool.length){showToast(t('toastNoQso'),true);return;}
  const ts=adifTimestamp();
  const lines=[
    `EDI -> ADIF ${ts}`,
    adifField('adif_ver','3.1.0'),
    adifField('created_timestamp',ts),
    adifField('programid','EDI-ADIF-Converter'),
    adifField('programversion','1.0'),
    '<EOH>',''
  ];
  pool.forEach(q=>{
    let rec='';
    rec+=adifField('CALL',q.call);
    rec+=adifField('QSO_DATE',q.date);
    rec+=adifField('TIME_ON',q.time);
    rec+=adifField('BAND',q.band);
    if(q.freq) rec+=adifField('FREQ',q.freq);
    rec+=adifField('MODE',q.mode);
    rec+=adifField('RST_SENT',q.rstS);
    rec+=adifField('RST_RCVD',q.rstR);
    if(q.stx) rec+=adifField('STX',q.stx.replace(/^0+/,'')||q.stx);
    if(q.srx) rec+=adifField('SRX',q.srx.replace(/^0+/,'')||q.srx);
    if(q.wwl) rec+=adifField('GRIDSQUARE',q.wwl);
    if(q.dist) rec+=adifField('DISTANCE',q.dist);
    if(q.myCall) rec+=adifField('STATION_CALLSIGN',q.myCall);
    if(q.myLoc)  rec+=adifField('MY_GRIDSQUARE',q.myLoc);
    if(q.pwr)    rec+=adifField('TX_PWR',q.pwr);
    if(q.contest)rec+=adifField('APP_EDIADIF_CONTEST',q.contest);
    if(q.ops){
      const firstOp=q.ops.split(/[;,]+/)[0].trim();
      if(firstOp) rec+=adifField('OPERATOR',firstOp);
    }
    const cmt=[q.txeq,q.rxeq,q.ant].filter(Boolean).join(' | ');
    if(cmt) rec+=adifField('COMMENT',cmt);
    if(q.exch) rec+=adifField('SRX_STRING',q.exch);
    rec+=adifField('APP_EDIADIF_SRC',q.src);
    lines.push(rec.trimEnd()+' <EOR>');
  });
  dl(lines.join('\n'), buildFilename('adif','adi'), 'text/plain');
  showToast(`${t('toastAdif')} (${pool.length} QSO)`);
}

// ════════════════════════════════════════
//  EXPORT: qslshop.de ADIF
//  Format modelled on the M1GEO+DH5YM EDI-ADIF Converter output that
//  qslshop.de accepted. Key constraints derived from byte-level inspection
//  of the reference file: LF endings, NO spaces between fields (fields
//  directly concatenated with no trailing whitespace), ADIF_VERS (with S),
//  version 3.1, integer FREQ, TIME_OFF=TIME_ON.
// ════════════════════════════════════════
function exportQSLShop(){
  // No trailing space — qslshop.de parser expects '<' immediately after value bytes.
  function f(tag,val){
    if(val===null||val===undefined||val==='') return '';
    const s=String(val);
    return `<${tag.toUpperCase()}:${s.length}>${s}`;
  }
  const pool=getExportPool();
  if(!pool.length){showToast(t('toastNoQso'),true);return;}
  const lines=[
    '<ADIF_VERS:3>3.1',
    '<EOH>',''
  ];
  pool.forEach(q=>{
    let rec='';
    rec+=f('CALL',q.call);
    rec+=f('BAND',q.band);
    if(q.freq) rec+=f('FREQ',String(Math.round(q.freq)));
    rec+=f('MODE',q.mode);
    rec+=f('QSO_DATE',q.date);
    rec+=f('TIME_ON',q.time);
    rec+=f('TIME_OFF',q.time);
    rec+=f('RST_RCVD',q.rstR);
    rec+=f('RST_SENT',q.rstS);
    if(q.srx) rec+=f('SRX',q.srx);
    if(q.stx) rec+=f('STX',q.stx);
    if(q.myLoc) rec+=f('MY_GRIDSQUARE',q.myLoc);
    if(q.wwl)   rec+=f('GRIDSQUARE',q.wwl);
    if(q.wwl){
      const cmt=q.dist?`${q.wwl} ${q.dist} km`:q.wwl;
      rec+=f('COMMENT',cmt);
    }
    lines.push(rec+'<EOR>');
  });
  dl(lines.join('\n'), buildFilename('qslshop','adi'), 'text/plain');
  showToast(`${t('toastQslShop')} (${pool.length} QSO)`);
}

// ════════════════════════════════════════
//  INLINE EDIT
// ════════════════════════════════════════
let _editActive=null; // {idx, field, td}

function startEdit(td, idx, field){
  if(_editActive) commitEdit();
  const qso=_all.find(q=>q._idx===idx);
  if(!qso) return;
  td.classList.add('editing');

  let ctrl;
  if(field==='mode'){
    ctrl=document.createElement('select');
    ctrl.className='cell-sel';
    ['SSB','CW','FM','AM','RTTY','SSTV','ATV'].forEach(m=>{
      const o=new Option(m,m);
      if(m===qso.mode) o.selected=true;
      ctrl.add(o);
    });
  } else if(field==='band'){
    ctrl=document.createElement('select');
    ctrl.className='cell-sel';
    BANDS.forEach(b=>{
      const o=new Option(b,b);
      if(b===qso.band) o.selected=true;
      ctrl.add(o);
    });
  } else {
    ctrl=document.createElement('input');
    ctrl.className='cell-inp';
    ctrl.value=qso[field]||'';
    if(field==='rstS'||field==='rstR') ctrl.maxLength=3;
    if(field==='wwl'||field==='myLoc') ctrl.maxLength=6;
    if(field==='timeDisp') ctrl.maxLength=5;
    if(field==='call') ctrl.addEventListener('input',()=>{ctrl.value=ctrl.value.toUpperCase();});
  }

  td.innerHTML='';
  td.appendChild(ctrl);
  ctrl.focus();
  if(ctrl.tagName==='INPUT') ctrl.select();

  _editActive={idx,field,td};
  ctrl.addEventListener('blur',()=>commitEdit());
  ctrl.addEventListener('keydown',e=>{
    if(e.key==='Enter'){ctrl.blur();}
    if(e.key==='Escape'){cancelEdit();}
  });
  // prevent click-to-sort on header bleeding through
  td.onclick=null;
}

function updateKeys(q){
  q._key=`${q.call}|${q.date}|${q.time}`;
  q._bandKey=`${q._key}|${q.band}`;
}

function recomputeDupes(){
  _all.forEach(q=>q.dupe=false);
  const seen=new Set();
  _all.forEach(q=>{
    if(seen.has(q._bandKey)) q.dupe=true;
    else seen.add(q._bandKey);
  });
}

function commitEdit(){
  if(!_editActive) return;
  const {idx,field,td}=_editActive;
  _editActive=null;
  const ctrl=td.querySelector('input,select');
  const qso=_all.find(q=>q._idx===idx);
  if(ctrl&&qso){
    const v=ctrl.value.trim();
    const keyChanging=field==='call'||field==='dateDisp'||field==='timeDisp'||field==='band';
    const oldBandKey=qso._bandKey;

    if(field==='wwl'||field==='myLoc'){
      const uc=v.toUpperCase();
      if(/^[A-R]{2}[0-9]{2}[A-X]{2}$/i.test(uc)){
        // wwl: mixed case (JN65ar); myLoc: all-uppercase per EDI/ADIF convention
        qso[field]=field==='wwl'?uc.slice(0,4)+uc.slice(4).toLowerCase():uc;
      } else { qso[field]=''; if(v) showToast(t('errLoc'),true); }
    } else if(field==='dateDisp'){
      const m=/^(\d{2})\.(\d{2})\.(\d{4})$/.exec(v);
      if(m){ qso.dateDisp=v; qso.date=`${m[3]}${m[2]}${m[1]}`; }
      else showToast(t('errDate'),true);
    } else if(field==='timeDisp'){
      const m=/^([01]\d|2[0-3]):([0-5]\d)$/.exec(v);
      if(m){ qso.timeDisp=v; qso.time=`${m[1]}${m[2]}`; }
      else showToast(t('errTime'),true);
    } else if(field==='call'){
      const uc=v.toUpperCase();
      if(/^[A-Z0-9/]{2,}$/.test(uc)) qso.call=uc;
      else showToast(t('errCall'),true);
    } else if(field==='band'){
      qso.band=v;
      const entry=BAND_MAP.find(e=>e[1]===v);
      if(entry) qso.freq=entry[2];
    } else {
      qso[field]=v;
    }

    if(keyChanging){
      const wasSelected=!_desel.has(oldBandKey);
      _desel.delete(oldBandKey);
      updateKeys(qso);
      if(!wasSelected) _desel.add(qso._bandKey);
      recomputeDupes();
      applyFilters();
      return;
    }
  }
  restoreCell(td,field,qso);
}

function cancelEdit(){
  if(!_editActive) return;
  const {field,td}=_editActive;
  const qso=_all.find(q=>q._idx===_editActive.idx);
  _editActive=null;
  restoreCell(td,field,qso);
}

function restoreCell(td,field,qso){
  td.classList.remove('editing');
  td.onclick=e=>startEdit(td,qso?qso._idx:-1,field);
  if(!qso){td.textContent='';return;}
  if(field==='mode'){
    td.innerHTML=`<span class="badge ${modeBadge(qso.mode)}">${htmlEsc(qso.mode)}</span>`;
  } else if(field==='band'){
    td.innerHTML=`<span class="badge badge-band">${htmlEsc(qso.band||'?')}</span>`;
  } else if(field==='call'){
    const dup=qso.dupe?`<span class="badge badge-dup">${t('dupLabel')}</span>`:'';
    td.innerHTML=`${htmlEsc(qso.call)}${dup}`;
  } else if(field==='wwl'||field==='myLoc'){
    td.textContent=qso[field]||'—';
  } else if(field==='dateDisp'){
    td.textContent=qso.dateDisp;
  } else if(field==='timeDisp'){
    td.textContent=qso.timeDisp;
  } else {
    td.textContent=qso[field]||'';
  }
}

function csvEsc(v){
  const s=String(v??'');
  return (s.includes(',')||s.includes('"'))?`"${s.replace(/"/g,'""')}"`:s;
}
function htmlEsc(s){
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function modeBadge(mode){
  if(mode==='SSB') return 'badge-ssb';
  if(mode==='CW')  return 'badge-cw';
  if(mode==='FM')  return 'badge-fm';
  return 'badge-digi';
}

function buildFilename(type,ext){
  const calls=[...new Set(_all.map(q=>q.myCall).filter(Boolean))];
  const base=(calls.length?calls[0]:'log').replace(/\//g,'-');
  return `${base}_${type}.${ext}`;
}

function dl(content,filename,mime){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type:mime}));
  a.download=filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),0);
}

// ════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════
let _toastTimer=null;
function showToast(msg,err=false){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='show'+(err?' err':'');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>el.className='',2800);
}

// ════════════════════════════════════════
//  RESET
// ════════════════════════════════════════
function resetApp(){
  cancelEdit();
  _all.length=0; _sources.length=0; _filtered.length=0;
  _desel.clear();
  _sortCol=1; _sortAsc=true;
  document.getElementById('searchInp').value='';
  document.getElementById('filterBand').selectedIndex=0;
  document.getElementById('filterMode').selectedIndex=0;
  document.getElementById('filterSrc').selectedIndex=0;
  document.getElementById('hideDups').checked=false;
  document.getElementById('app').style.display='none';
  document.getElementById('dropzone').style.display='flex';
  document.getElementById('statsBar').style.display='none';
  document.getElementById('fileInput').value='';
}

// ════════════════════════════════════════
//  DRAG & DROP + FILE INPUT
// ════════════════════════════════════════
const dropArea=document.getElementById('dropArea');
dropArea.addEventListener('dragover',e=>{e.preventDefault();dropArea.classList.add('drag')});
dropArea.addEventListener('dragleave',()=>dropArea.classList.remove('drag'));
dropArea.addEventListener('drop',e=>{
  e.preventDefault();dropArea.classList.remove('drag');
  handleFiles(e.dataTransfer.files);
});
document.getElementById('fileInput').addEventListener('change',e=>handleFiles(e.target.files));

// Also allow drop on app area when loaded
document.addEventListener('dragover',e=>{if(e.dataTransfer.types.includes('Files'))e.preventDefault();});
document.addEventListener('drop',e=>{
  if(!e.dataTransfer.files.length) return;
  e.preventDefault();
  if(document.getElementById('app').style.display!=='none') handleFiles(e.dataTransfer.files);
});

// ════════════════════════════════════════
//  THEME
// ════════════════════════════════════════
function toggleTheme(){
  const html=document.documentElement;
  const toLight=html.dataset.theme!=='light';
  html.dataset.theme=toLight?'light':'dark';
  document.getElementById('btnTheme').textContent=toLight?'☾':'☀';
  localStorage.setItem('theme',html.dataset.theme);
}
(function(){
  const saved=localStorage.getItem('theme');
  if(saved==='light'){
    document.documentElement.dataset.theme='light';
    document.getElementById('btnTheme').textContent='☾';
  }
})();
</script>
