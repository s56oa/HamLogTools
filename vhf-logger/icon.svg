<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e4d7a"/>
      <stop offset="50%" stop-color="#2a6ba8"/>
      <stop offset="100%" stop-color="#4d9de0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>

  <!-- Subtle grid pattern (locator map hint) -->
  <g opacity="0.15" stroke="#a8d4f7" stroke-width="2" fill="none">
    <line x1="180" y1="120" x2="420" y2="360"/>
    <line x1="220" y1="120" x2="460" y2="360"/>
    <line x1="140" y1="160" x2="380" y2="400"/>
    <line x1="140" y1="200" x2="380" y2="440"/>
    <line x1="180" y1="120" x2="180" y2="360"/>
    <line x1="260" y1="120" x2="260" y2="360"/>
    <line x1="340" y1="120" x2="340" y2="360"/>
    <line x1="420" y1="120" x2="420" y2="360"/>
    <line x1="140" y1="160" x2="460" y2="160"/>
    <line x1="140" y1="240" x2="460" y2="240"/>
    <line x1="140" y1="320" x2="460" y2="320"/>
    <line x1="140" y1="400" x2="460" y2="400"/>
  </g>

  <!-- Signal waves (concentric arcs, centered near antenna top) -->
  <g fill="none" stroke-linecap="round">
    <path d="M 140 240 A 120 120 0 0 1 380 240" stroke="#7bbdf0" stroke-width="14" opacity="0.6"/>
    <path d="M 100 240 A 160 160 0 0 1 420 240" stroke="#a8d4f7" stroke-width="10" opacity="0.35"/>
    <path d="M 180 240 A 80 80 0 0 1 340 240" stroke="#4d9de0" stroke-width="18" opacity="0.9"/>
  </g>

  <!-- Yagi antenna -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- Boom (vertical, because Yagi is typically horizontal but we rotate for icon composition) -->
    <line x1="256" y1="140" x2="256" y2="310" stroke="#cdd9e5" stroke-width="14"/>
    <!-- Reflector -->
    <line x1="190" y1="170" x2="322" y2="170" stroke="#e8f1f8" stroke-width="12"/>
    <!-- Driven element -->
    <line x1="200" y1="225" x2="312" y2="225" stroke="#cdd9e5" stroke-width="10"/>
    <!-- Director 1 -->
    <line x1="210" y1="270" x2="302" y2="270" stroke="#a8c6db" stroke-width="8"/>
    <!-- Director 2 -->
    <line x1="220" y1="305" x2="292" y2="305" stroke="#8ab4d0" stroke-width="6"/>
  </g>

  <!-- Locator pin -->
  <g transform="translate(370, 190)">
    <path d="M 0 42 C -23 42, -42 23, -42 0 C -42 -23, -23 -42, 0 -42 C 23 -42, 42 -23, 42 0 C 42 23, 23 42, 0 42 Z M 0 68 L -18 40 L 18 40 Z" fill="#f0a500" opacity="0.9"/>
    <circle cx="0" cy="0" r="16" fill="#0a0e14"/>
    <circle cx="0" cy="0" r="8" fill="#4d9de0"/>
  </g>

  <!-- QSO log card (bottom-left, subtle) -->
  <g transform="translate(60, 330)">
    <rect x="0" y="0" width="160" height="110" rx="10" fill="#f0f4f8" opacity="0.92"/>
    <rect x="0" y="0" width="160" height="26" rx="10" fill="#e4ecf3"/>
    <rect x="0" y="16" width="160" height="12" fill="#e4ecf3"/>
    <!-- Checkmarks and lines -->
    <g opacity="0.6">
      <rect x="16" y="44" width="12" height="12" rx="2" fill="#4d9de0"/>
      <rect x="38" y="48" width="80" height="4" rx="2" fill="#8899aa"/>
      <rect x="16" y="66" width="12" height="12" rx="2" fill="#4d9de0"/>
      <rect x="38" y="70" width="80" height="4" rx="2" fill="#8899aa"/>
      <rect x="16" y="88" width="12" height="12" rx="2" fill="#4d9de0"/>
      <rect x="38" y="92" width="60" height="4" rx="2" fill="#8899aa"/>
    </g>
  </g>

  <!-- Subtle laurel/wreath decorations (simplified as curved leaves) -->
  <g fill="#d4af37" opacity="0.35">
    <ellipse cx="135" cy="200" rx="10" ry="6" transform="rotate(-30 135 200)"/>
    <ellipse cx="125" cy="220" rx="10" ry="6" transform="rotate(-45 125 220)"/>
    <ellipse cx="120" cy="245" rx="10" ry="6" transform="rotate(-60 120 245)"/>
    <ellipse cx="125" cy="270" rx="10" ry="6" transform="rotate(-75 125 270)"/>
    <ellipse cx="140" cy="290" rx="10" ry="6" transform="rotate(-90 140 290)"/>
    
    <ellipse cx="377" cy="200" rx="10" ry="6" transform="rotate(30 377 200)"/>
    <ellipse cx="387" cy="220" rx="10" ry="6" transform="rotate(45 387 220)"/>
    <ellipse cx="392" cy="245" rx="10" ry="6" transform="rotate(60 392 245)"/>
    <ellipse cx="387" cy="270" rx="10" ry="6" transform="rotate(75 387 270)"/>
    <ellipse cx="372" cy="290" rx="10" ry="6" transform="rotate(90 372 290)"/>
  </g>

  <!-- Sparkles/stars (subtle) -->
  <g fill="#f0d878" opacity="0.5">
    <polygon points="170,140 174,150 184,150 176,156 179,166 170,160 161,166 164,156 156,150 166,150"/>
    <polygon points="360,120 362,126 368,126 363,130 365,136 360,132 355,136 357,130 352,126 358,126"/>
    <polygon points="330,310 332,316 338,316 333,320 335,326 330,322 325,326 327,320 322,316 328,316"/>
  </g>

  <!-- Database icon (bottom-right) -->
  <g transform="translate(420, 390)">
    <ellipse cx="0" cy="-18" rx="28" ry="10" fill="#cdd9e5" opacity="0.9"/>
    <rect x="-28" y="-18" width="56" height="28" rx="0" fill="#cdd9e5" opacity="0.9"/>
    <ellipse cx="0" cy="10" rx="28" ry="10" fill="#a8c6db" opacity="0.9"/>
    <line x1="-28" y1="-18" x2="-28" y2="10" stroke="#8899aa" stroke-width="2" opacity="0.5"/>
    <line x1="28" y1="-18" x2="28" y2="10" stroke="#8899aa" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Outer rounded border (matching the raster's light blue border) -->
  <rect x="8" y="8" width="496" height="496" rx="80" fill="none" stroke="#7bbdf0" stroke-width="6" opacity="0.35"/>
</svg>
