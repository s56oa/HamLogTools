<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>S56OA VHF/UHF Contest Logger</title>
<link rel="manifest" href="vhf-logger.webmanifest">
<meta name="theme-color" content="#4d9de0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="S56OA Logger">
<!-- iOS icons: sized entries + generic fallback for unmatched devices -->
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="apple-touch-icon" sizes="167x167" href="icon-167.png">
<link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
<link rel="apple-touch-icon" href="icon-180.png">
<!-- Desktop favicon -->
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0e14;--bg2:#0f1520;--bg3:#162030;--bg4:#1c2a3a;
  --border:#1e3048;--border2:#254060;--text:#cdd9e5;--muted:#637e96;
  --dim:#3d5a70;--accent:#4d9de0;--accent2:#2ecc8a;--accent3:#f0a500;
  --danger:#e05c4d;--hdr:linear-gradient(135deg,#0a0e14 0%,#0d1a28 100%);
  --call:#79c0ff;--r:6px;
}
html[data-theme="light"] {
  --bg:#f0f4f8;--bg2:#ffffff;--bg3:#e4ecf3;--bg4:#d4e0eb;
  --border:#bfcfdd;--border2:#96b0c6;--text:#18273a;--muted:#4a6275;
  --dim:#7a9ab0;--accent:#1a6fad;--accent2:#178a58;--accent3:#a06800;
  --danger:#c03030;--hdr:linear-gradient(135deg,#dde8f2 0%,#eaf2f8 100%);
  --call:var(--accent);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:14px;min-height:100vh;transition:background-color .2s,color .2s}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

header{
  background:var(--hdr);border-bottom:1px solid var(--border);
  padding:.7rem 1.1rem;display:flex;align-items:center;gap:.75rem;
  position:sticky;top:0;z-index:200;backdrop-filter:blur(8px);height:52px;
}
.logo{font-family:'Space Mono',monospace;font-size:.95rem;letter-spacing:-.02em;white-space:nowrap}
.logo .icon{color:var(--accent2);margin:0 .3rem}
.version{font-family:'Space Mono',monospace;font-size:10px;color:var(--dim);
  padding:1px 6px;border:1px solid var(--border);border-radius:3px;white-space:nowrap}
.hdr-info{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;
  display:flex;gap:.9rem;align-items:center;flex:1;overflow:hidden}
.hdr-call{color:var(--call);font-weight:700}
.lang-wrap{margin-left:auto;display:flex;gap:4px;flex-shrink:0}
.lang-btn{background:transparent;border:1px solid var(--border);color:var(--muted);
  border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;cursor:pointer;
  transition:all .15s;font-family:'Space Mono',monospace}
.lang-btn.active{background:var(--bg4);border-color:var(--accent);color:var(--accent)}
.theme-btn{background:transparent;border:1px solid var(--border);color:var(--muted);
  border-radius:4px;padding:2px 7px;font-size:13px;cursor:pointer;line-height:1;transition:all .15s}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}

.btn{border:none;border-radius:var(--r);padding:.45rem 1rem;font-size:.82rem;
  font-weight:600;cursor:pointer;transition:all .15s;font-family:'IBM Plex Sans',sans-serif;
  min-height:36px;touch-action:manipulation}
.btn-primary{background:var(--accent);color:#0a0e14}
.btn-primary:hover{opacity:.85}
.btn-success{background:var(--accent2);color:#0a0e14}
.btn-success:hover{opacity:.85}
.btn-secondary{background:var(--bg4);color:var(--text);border:1px solid var(--border2)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:rgba(224,92,77,.13);color:var(--danger);border:1px solid rgba(224,92,77,.28)}
.btn-danger:hover{background:rgba(224,92,77,.22)}
.btn-sm{padding:.28rem .7rem;font-size:.75rem;min-height:28px}
.btn-lg{padding:.7rem 1.4rem;font-size:.95rem;min-height:46px}
.btn:disabled{opacity:.35;cursor:default;pointer-events:none}

.screen{display:none}
.screen.active{display:block}

/* ── HOME ── */
#screen-home.active{display:block;padding:1.5rem}
.home-hdr{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap}
.home-title{font-family:'Space Mono',monospace;font-size:1rem;flex:1}
.base-tag{font-size:10px;color:var(--accent2);border:1px solid rgba(46,204,138,.3);
  border-radius:3px;padding:1px 6px;font-family:'Space Mono',monospace}
.log-list{display:flex;flex-direction:column;gap:.7rem;max-width:880px}
.log-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:1rem 1.1rem;display:grid;gap:.4rem;
  grid-template-areas:"title act" "meta act" "bands act";
  grid-template-columns:1fr auto;transition:border-color .15s;
}
.log-card:hover{border-color:var(--border2)}
.lc-title{grid-area:title;font-family:'Space Mono',monospace;font-size:.88rem;
  display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
.lc-call{color:var(--call);font-weight:700}
.lc-meta{grid-area:meta;font-size:11px;color:var(--muted);display:flex;gap:.9rem;flex-wrap:wrap}
.lc-bands{grid-area:bands;display:flex;gap:.35rem;flex-wrap:wrap;align-items:center}
.lc-act{grid-area:act;display:flex;flex-direction:column;gap:.35rem;align-items:flex-end}
.bchip{font-family:'Space Mono',monospace;font-size:10px;padding:2px 8px;
  border-radius:3px;background:var(--bg3);border:1px solid var(--border2);
  display:flex;align-items:center;gap:4px}
.bchip .bc{color:var(--accent);font-weight:700}
.bchip .bk{color:var(--accent2);font-size:9px}
.empty-state{text-align:center;padding:3.5rem 2rem;color:var(--muted);
  border:1.5px dashed var(--border2);border-radius:12px;max-width:480px;margin:0 auto}
.empty-ico{font-size:2.5rem;margin-bottom:1rem;opacity:.6}
.empty-title{font-family:'Space Mono',monospace;font-size:.88rem;margin-bottom:.4rem}
.empty-sub{font-size:.8rem;line-height:1.6}

/* ── SETUP ── */
#screen-setup.active{display:block;padding:1.5rem}
.setup-wrap{max-width:700px;margin:0 auto}
.setup-title{font-family:'Space Mono',monospace;font-size:.95rem;color:var(--accent);margin-bottom:1.25rem}
.fsec{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:1rem 1.1rem;margin-bottom:.9rem}
.fsec-hdr{font-size:.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:.85rem;display:flex;align-items:center;justify-content:space-between}
.frow{display:flex;gap:.65rem;margin-bottom:.65rem;flex-wrap:wrap}
.frow:last-child{margin-bottom:0}
.field{display:flex;flex-direction:column;gap:3px;flex:1;min-width:130px}
.field label{font-size:11px;color:var(--muted);font-weight:500}
.inp{background:var(--bg3);border:1px solid var(--border2);border-radius:4px;
  color:var(--text);padding:.45rem .7rem;font-size:.88rem;
  font-family:'IBM Plex Sans',sans-serif;width:100%;min-height:36px}
.inp:focus{outline:none;border-color:var(--accent)}
.inp.mono{font-family:'Space Mono',monospace}
.band-rows{display:flex;flex-direction:column;gap:.45rem}
.brow{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:.45rem .65rem;display:flex;flex-direction:column;gap:.35rem}
.brow-main{display:grid;gap:.45rem;align-items:center;grid-template-columns:18px 110px 100px 70px 1fr 28px}
.brow-eq{display:grid;gap:.45rem;grid-template-columns:1fr 1fr 120px;padding-left:22px}
.brow-idx{font-family:'Space Mono',monospace;font-size:10px;color:var(--dim);text-align:center}
.bsel{background:var(--bg4);border:1px solid var(--border2);border-radius:4px;
  color:var(--text);padding:.3rem .4rem;font-size:.8rem;cursor:pointer;font-family:'Space Mono',monospace;width:100%}
.inp-sm{background:var(--bg3);border:1px solid var(--border2);border-radius:4px;
  color:var(--text);padding:.3rem .5rem;font-size:.8rem;width:100%;font-family:'Space Mono',monospace}
.inp-sm:focus{outline:none;border-color:var(--accent)}
.setup-act{display:flex;gap:.65rem;margin-top:1.1rem;flex-wrap:wrap}

/* ── LOGGER ── */
#screen-logger.active{display:flex;flex-direction:column;height:calc(100dvh - 52px);overflow:hidden}
.stats-bar{background:var(--bg2);border-bottom:1px solid var(--border);
  padding:.45rem .9rem;display:flex;align-items:center;gap:1.2rem;flex-wrap:wrap;flex-shrink:0}
.st{display:flex;flex-direction:column;gap:1px}
.st-val{font-family:'Space Mono',monospace;font-size:.95rem;font-weight:700;color:var(--accent)}
.st-lbl{font-size:10px;color:var(--muted)}
.st-sep{width:1px;height:26px;background:var(--border)}
.st-sep.push{margin-left:auto}
.band-tabs{background:var(--bg3);border-bottom:1px solid var(--border);
  padding:.35rem .7rem;display:flex;gap:.3rem;align-items:center;flex-wrap:wrap;flex-shrink:0}
.btab{font-family:'Space Mono',monospace;font-size:.78rem;padding:.28rem .75rem;border-radius:4px;
  border:1px solid var(--border2);background:var(--bg4);color:var(--muted);cursor:pointer;
  transition:all .15s;touch-action:manipulation}
.btab.active{background:rgba(77,157,224,.15);border-color:var(--accent);color:var(--accent)}
.btab .tn{font-size:9px;color:var(--dim);margin-left:3px}

/* Table panel — fills space above form */
.tbl-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.tbl-bar{background:var(--bg2);border-bottom:1px solid var(--border);
  padding:.4rem .65rem;display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.tbl-sel{background:var(--bg3);border:1px solid var(--border2);border-radius:4px;
  color:var(--text);padding:.28rem .5rem;font-size:.78rem;cursor:pointer;font-family:'Space Mono',monospace}
.tbl-cnt{font-size:10px;color:var(--dim);margin-left:auto;font-family:'Space Mono',monospace}
.tbl-wrap{flex:1;overflow:auto;background:var(--bg2)}

/* QSO panel — fixed compact bar at bottom */
.qso-panel{background:var(--bg2);border-top:2px solid var(--border2);
  padding:.55rem .9rem .65rem;flex-shrink:0;display:flex;flex-direction:column;gap:.35rem}
.qf-hints{display:flex;flex-direction:column;gap:.25rem}
.xhint{font-size:.78rem;display:none;flex-direction:column;gap:.25rem}
.xhint.show{display:flex}
.xh-row{display:flex;align-items:center;gap:.45rem;flex-wrap:wrap}
.xh-lbl{color:var(--muted);font-size:.72rem;font-weight:600;white-space:nowrap}
.xh-val{font-family:'Space Mono',monospace;color:var(--text)}
.xbadge{display:inline-block;font-family:'Space Mono',monospace;font-size:.68rem;padding:1px 5px;border-radius:2px}
.xb-ok{background:rgba(46,204,138,.2);color:#3fb950}
.xb-warn{background:rgba(240,165,0,.2);color:var(--accent3)}
.xb-err{background:rgba(224,92,77,.2);color:var(--danger)}
.xb-dim{background:rgba(99,126,150,.15);color:var(--muted)}
.dupe-warn{font-family:'Space Mono',monospace;font-size:.76rem;color:var(--accent3);display:none}
.dupe-warn.show{display:block}
.missing-warn{font-family:'Space Mono',monospace;font-size:.76rem;color:var(--danger);display:none;align-items:center;gap:.5rem;flex-wrap:wrap}
.missing-warn.show{display:flex}
.field-warn{border-color:var(--danger)!important;box-shadow:0 0 0 1px var(--danger)!important}

/* Main input row */
.qf-main{display:flex;gap:.4rem;align-items:flex-end}
.qf-lbl{font-size:10px;color:var(--muted);font-weight:500;margin-bottom:2px;white-space:nowrap}
.qf-lbl-row{display:flex;align-items:center;gap:.4rem;margin-bottom:2px}
.qf-call{flex:2;min-width:140px;position:relative}
.qf-wwl {flex:1.4;min-width:110px}
.qf-mode{width:76px;flex-shrink:0}
.qf-rst {width:54px;flex-shrink:0}
.qf-nrr {width:58px;flex-shrink:0}

/* Autocomplete — opens upward */
.call-wrap{position:relative}
.acdrop{position:absolute;left:0;right:0;bottom:calc(100% + 2px);z-index:150;
  background:var(--bg3);border:1px solid var(--accent);border-radius:6px;
  max-height:220px;overflow-y:auto;display:none}
.acdrop.open{display:block}
.aci{padding:.5rem .75rem;cursor:pointer;display:flex;align-items:center;gap:.6rem;
  border-bottom:1px solid var(--border);font-family:'Space Mono',monospace;font-size:.82rem;
  transition:background .1s;touch-action:manipulation}
.aci:last-child{border-bottom:none}
.aci:hover,.aci.hi{background:rgba(77,157,224,.12)}
.aci-call{color:var(--call);font-weight:700}
.aci-loc{color:var(--accent2);font-size:.76rem}
.aci-cnt{color:var(--dim);font-size:.72rem;margin-left:auto}

/* loc hint — inline next to WWL label */
.loc-hint{display:none;align-items:center;gap:.3rem;font-family:'Space Mono',monospace;font-size:.72rem}
.loc-hint.show{display:flex}
.lh-lbl{color:var(--muted)}
.lh-val{color:var(--accent2);font-weight:700}
.lh-cnt{color:var(--dim)}

.qinp{background:var(--bg3);border:1.5px solid var(--border2);border-radius:6px;
  color:var(--text);padding:.5rem .65rem;font-size:1rem;font-family:'Space Mono',monospace;
  width:100%;min-height:44px;transition:border-color .15s;touch-action:manipulation;
  text-transform:uppercase;-webkit-text-transform:uppercase}
.qinp:focus{outline:none;border-color:var(--accent);background:var(--bg4)}
.qinp.wwl{text-transform:none;-webkit-text-transform:none}
.qinp.warn{border-color:var(--accent3)}
.qinp.ok{border-color:var(--accent2)}
.qsel{background:var(--bg3);border:1.5px solid var(--border2);border-radius:6px;
  color:var(--text);padding:.4rem .4rem;font-size:.85rem;font-family:'Space Mono',monospace;
  width:100%;min-height:44px;cursor:pointer;touch-action:manipulation}
.qsel:focus{outline:none;border-color:var(--accent)}
.qinp-sm{background:var(--bg3);border:1.5px solid var(--border2);border-radius:6px;
  color:var(--text);padding:.4rem .5rem;font-size:.9rem;font-family:'Space Mono',monospace;
  width:100%;min-height:44px;touch-action:manipulation;text-align:center}
.qinp-sm:focus{outline:none;border-color:var(--accent);background:var(--bg4)}

/* Info row below main inputs */
.qf-info{display:flex;align-items:center;gap:.75rem;font-family:'Space Mono',monospace;font-size:.78rem;color:var(--muted)}
.qf-nr-val{color:var(--dim);font-weight:700;font-size:.82rem}
.utc-v{color:var(--accent3);font-weight:700;font-size:.88rem}
.local-v{color:var(--dim);font-size:.78rem}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{position:sticky;top:0;z-index:2}
th{background:var(--bg3);border-bottom:1px solid var(--border2);
  padding:.42rem .6rem;text-align:left;white-space:nowrap;
  font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
td{padding:.38rem .6rem;border-bottom:.5px solid var(--border);vertical-align:middle;white-space:nowrap}
tr:last-child td{border-bottom:none}
td.call{font-family:'Space Mono',monospace;font-weight:700;color:var(--call)}
td.loc{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)}
td.num{font-family:'Space Mono',monospace;color:var(--dim);font-size:11px}
td.km{font-family:'Space Mono',monospace;font-size:11px;color:var(--accent2)}
tr.is-dup{background:rgba(240,165,0,.08)}
tr.is-dup td.call{color:var(--accent3)}
tr.is-xf td{background:rgba(224,92,77,.06)}
tr:hover td{background:rgba(77,157,224,.04)}
#tBody tr{cursor:pointer}
#tBody tr.editing td{background:rgba(77,157,224,.14)!important}
#tBody tr.editing td.call{color:var(--accent)}
.edit-bar{display:flex;align-items:center;gap:.6rem;padding:.3rem .6rem;
  background:rgba(77,157,224,.1);border:1px solid rgba(77,157,224,.3);border-radius:4px;flex-wrap:wrap}
.edit-badge{font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700;color:var(--accent);white-space:nowrap}
.edit-utc{font-family:'Space Mono',monospace;font-size:.8rem;background:var(--bg3);
  border:1px solid var(--border2);border-radius:4px;color:var(--text);padding:.2rem .5rem;width:88px}
.mdg{display:inline-block;font-size:9px;padding:1px 4px;border-radius:2px;
  font-family:'Space Mono',monospace;vertical-align:middle;margin-left:2px}
.mdg-ssb{background:rgba(77,157,224,.2);color:var(--call)}
.mdg-cw{background:rgba(46,204,138,.2);color:#3fb950}
.mdg-fm{background:rgba(240,165,0,.2);color:var(--accent3)}
.mdg-dup{background:rgba(240,165,0,.25);color:var(--accent3)}
.mdg-x{background:rgba(224,92,77,.2);color:var(--danger)}
.btn-del{background:none;border:none;color:var(--border2);cursor:pointer;padding:4px 8px;
  border-radius:3px;font-size:11px;transition:color .1s;line-height:1;min-width:32px;min-height:32px}
.btn-del:hover{color:var(--danger)}

/* Export modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:500;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:1.4rem;min-width:300px;max-width:420px;width:calc(100% - 2rem)}
.modal-title{font-family:'Space Mono',monospace;font-size:.88rem;color:var(--accent);margin-bottom:1rem}
.exp-row{display:flex;align-items:center;gap:.75rem;margin-bottom:.55rem}
.exp-band{font-family:'Space Mono',monospace;color:var(--call);min-width:60px;font-weight:700}
.exp-info{color:var(--muted);font-size:.78rem}

/* Toast */
#toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;
  background:var(--bg3);border:1px solid var(--accent2);border-radius:var(--r);
  padding:.55rem .95rem;font-size:.78rem;color:var(--accent2);
  transform:translateY(100px);opacity:0;transition:all .3s;pointer-events:none;
  font-family:'Space Mono',monospace}
#toast.show{transform:translateY(0);opacity:1}
#toast.err{border-color:var(--danger);color:var(--danger)}

@media(max-width:768px){
  #screen-logger.active{height:calc(100dvh - 52px)}
  .qf-main{flex-wrap:wrap}
  .qf-call{flex-basis:55%;min-width:120px}
  .qf-wwl{flex-basis:40%;min-width:100px}
  .stats-bar{gap:.75rem}
  .brow-main{grid-template-columns:14px 90px 90px 60px 1fr 24px;gap:.3rem}
  .brow-eq{grid-template-columns:1fr 1fr 80px}
}
@media(max-width:360px){
  .qf-mode{width:64px}
  .qf-rst,.qf-nrr{width:46px}
}

/* ── Per-band stats panel ── */
.stats-detail{background:var(--bg3);border-bottom:1px solid var(--border);
  padding:.4rem .9rem;flex-shrink:0;overflow-x:auto;display:none}
.stats-detail.open{display:block}
.sdtbl{width:100%;border-collapse:collapse;font-size:11px;font-family:'Space Mono',monospace;min-width:360px}
.sdtbl th{color:var(--muted);text-transform:uppercase;font-size:9px;letter-spacing:.05em;
  padding:.25rem .55rem;white-space:nowrap;text-align:right}
.sdtbl th:first-child{text-align:left}
.sdtbl td{padding:.28rem .55rem;white-space:nowrap;text-align:right;border-top:.5px solid var(--border)}
.sdtbl td:first-child{text-align:left;font-weight:700}
.sdtbl td.sd-odx{color:var(--accent2);font-size:10px}
.sdtbl tr:last-child td{border-bottom:none}

/* ── Manual time override ── */
.time-ovr{display:none;align-items:center;gap:.3rem;margin-left:.3rem}
.time-ovr.show{display:flex}
.ovr-inp{background:var(--bg3);border:1.5px solid var(--accent3);border-radius:4px;
  color:var(--accent3);padding:.2rem .4rem;font-size:.85rem;
  font-family:'Space Mono',monospace;width:58px;text-align:center;min-height:28px}
.ovr-inp:focus{outline:none}
.ovr-lbl{font-size:10px;color:var(--accent3);font-weight:600;white-space:nowrap}

/* ── Icon buttons ── */
.btn-icon{background:transparent;border:1px solid var(--border);color:var(--muted);
  border-radius:4px;padding:2px 7px;font-size:13px;cursor:pointer;line-height:1;
  transition:all .15s;min-height:28px;font-family:inherit}
.btn-icon:hover{border-color:var(--accent);color:var(--accent)}
.btn-icon.on{border-color:var(--accent3)!important;color:var(--accent3)!important}
</style>
</head>
<body>

<header>
  <div class="logo">S56OA VHF<span class="icon">◉</span>Logger</div>
  <span class="version">v1.8</span>
  <div class="hdr-info" id="hdrInfo"></div>
  <div class="lang-wrap">
    <button class="theme-btn" id="btnTheme" onclick="toggleTheme()" aria-label="Preklopi temo / Toggle theme">☀</button>
    <button class="lang-btn active" id="btnSL" onclick="setLang('sl')">SL</button>
    <button class="lang-btn"        id="btnEN" onclick="setLang('en')">EN</button>
  </div>
</header>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="home-hdr">
    <div class="home-title" data-i18n="homeTitle">VHF Logger</div>
    <span class="base-tag" id="homeBaseTag" style="display:none"></span>
    <button class="btn btn-secondary btn-sm" onclick="exportBackup()" data-i18n="btnBackup">⬇ Backup</button>
    <button class="btn btn-secondary btn-sm" onclick="triggerRestore()" data-i18n="btnRestore">⬆ Obnovi</button>
    <input type="file" id="restoreInput" accept=".json" style="display:none" onchange="handleRestoreFile(this)">
    <button class="btn btn-primary" onclick="showSetup()" data-i18n="btnNewLog">+ Nov dnevnik</button>
  </div>
  <div class="log-list" id="logList"></div>
</div>

<!-- SETUP -->
<div id="screen-setup" class="screen">
  <div class="setup-wrap">
    <div class="setup-title" id="setupTitle" data-i18n="setupNew">Nov dnevnik</div>
    <div class="fsec">
      <div class="fsec-hdr"><span data-i18n="setupStation">Postaja</span></div>
      <div class="frow">
        <div class="field">
          <label data-i18n="lblMyCall">Moj klicni znak</label>
          <input class="inp mono" id="fMyCall" placeholder="S56OA" oninput="this.value=this.value.toUpperCase()">
        </div>
        <div class="field">
          <label data-i18n="lblMyLoc">Moj lokator</label>
          <input class="inp mono" id="fMyLoc" placeholder="JN65WP" maxlength="6" oninput="this.value=this.value.toUpperCase()">
        </div>
      </div>
      <div class="frow">
        <div class="field" style="flex:2">
          <label data-i18n="lblContest">Tekmovanje</label>
          <input class="inp" id="fContest" placeholder="IARU R1 UHF Contest">
        </div>
        <div class="field">
          <label data-i18n="lblOperator">Operator</label>
          <input class="inp mono" id="fOperator" placeholder="S56OA">
        </div>
        <div class="field">
          <label data-i18n="lblClub">Klub (EDI PClub)</label>
          <input class="inp mono" id="fClub" placeholder="S59DGO" oninput="this.value=this.value.toUpperCase()">
        </div>
      </div>
    </div>
    <div class="fsec">
      <div class="fsec-hdr"><span data-i18n="setupReporter">Oddajatelj</span></div>
      <div class="frow">
        <div class="field">
          <label data-i18n="lblSect">Sekcija (EDI PSect)</label>
          <input class="inp mono" id="fSect" placeholder="MO" oninput="this.value=this.value.toUpperCase()">
        </div>
        <div class="field" style="flex:3">
          <label data-i18n="lblQthName">Ime lokacije (QTH)</label>
          <input class="inp" id="fQthName" placeholder="Krvavec">
        </div>
      </div>
      <div class="frow">
        <div class="field">
          <label data-i18n="lblRCall">Odgovorni (kl. znak)</label>
          <input class="inp mono" id="fRCall" placeholder="S56OA" oninput="this.value=this.value.toUpperCase()">
        </div>
        <div class="field" style="flex:2">
          <label data-i18n="lblRName">Odgovorni (ime)</label>
          <input class="inp" id="fRName" placeholder="Ime Priimek">
        </div>
      </div>
      <div class="frow">
        <div class="field">
          <label data-i18n="lblRCity">Odgovorni (kraj)</label>
          <input class="inp" id="fRCity" placeholder="Ljubljana">
        </div>
        <div class="field">
          <label data-i18n="lblRCoun">Odgovorni (država)</label>
          <input class="inp mono" id="fRCoun" placeholder="SI" oninput="this.value=this.value.toUpperCase()">
        </div>
        <div class="field" style="flex:2">
          <label data-i18n="lblREmail">Odgovorni (e-pošta)</label>
          <input class="inp" id="fREmail" placeholder="ime@example.com">
        </div>
      </div>
    </div>
    <div class="fsec">
      <div class="fsec-hdr">
        <span data-i18n="setupBands">Pasovi</span>
        <button class="btn btn-secondary btn-sm" onclick="addBandRow()" data-i18n="btnAddBand">+ Dodaj pas</button>
      </div>
      <div class="band-rows" id="bandRows"></div>
    </div>
    <div class="setup-act">
      <button class="btn btn-success btn-lg" onclick="startSession()" data-i18n="btnStart">▶ Začni logiranje</button>
      <button class="btn btn-secondary" onclick="cancelSetup()" data-i18n="btnCancel">Prekliči</button>
    </div>
  </div>
</div>

<!-- LOGGER -->
<div id="screen-logger" class="screen">
  <div class="stats-bar" id="statsBar">
    <div class="st"><span class="st-val" id="stQso">0</span><span class="st-lbl">QSO</span></div>
    <div class="st-sep"></div>
    <div class="st"><span class="st-val" id="stKm">0</span><span class="st-lbl">km</span></div>
    <div class="st-sep"></div>
    <div class="st"><span class="st-val" id="stSq">0</span><span class="st-lbl" data-i18n="statSq">kvadratov</span></div>
    <div class="st-sep"></div>
    <div class="st"><span class="st-val" id="stODX">—</span><span class="st-lbl">ODX km</span></div>
    <div class="st-sep push"></div>
    <button class="btn-icon" id="btnStats" onclick="toggleStatsPanel()" title="Statistika po pasovih / Per-band stats">📊</button>
    <button class="btn-icon" id="btnSound" onclick="toggleSound()" title="Zvok QSO / QSO beep">🔊</button>
    <button class="btn btn-secondary btn-sm" onclick="triggerImport()" data-i18n="btnImport">⬆ EDI</button>
    <button class="btn btn-secondary btn-sm" onclick="editSessionSetup()" data-i18n="btnEditSetup">⚙ Uredi</button>
    <button class="btn btn-secondary btn-sm" onclick="pauseSession()" data-i18n="btnPause">⏸ Pavza</button>
    <button class="btn btn-secondary btn-sm" onclick="showExportModal()" data-i18n="btnExport">⬇ EDI</button>
  </div>
  <div class="band-tabs" id="bandTabs"></div>
  <div class="stats-detail" id="statsDetail">
    <table class="sdtbl" id="sdTbl"></table>
  </div>

  <!-- Table — fills available space, newest QSO at bottom -->
  <div class="tbl-panel">
    <div class="tbl-bar">
      <select class="tbl-sel" id="tblFilt" onchange="renderTable()">
        <option value="" data-i18n="fAllBands">— vsi pasovi —</option>
      </select>
      <span class="tbl-cnt" id="tblCnt"></span>
    </div>
    <div class="tbl-wrap" id="tblWrap">
      <table><thead><tr id="tHead"></tr></thead><tbody id="tBody"></tbody></table>
    </div>
  </div>

  <!-- QSO entry form — compact horizontal bar at bottom -->
  <div class="qso-panel">
    <!-- Edit mode indicator -->
    <div class="edit-bar" id="editBar" style="display:none">
      <span class="edit-badge" id="editBadge">✎ Urejanje</span>
      <button class="btn btn-secondary btn-sm" onclick="cancelEdit()" data-i18n="btnCancelEdit" style="margin-left:auto">✕ Prekliči</button>
    </div>
    <!-- Contextual hints: xcheck info + dupe warning -->
    <div class="qf-hints">
      <div class="xhint" id="xhint"><div class="xh-row" id="xhRow"></div></div>
      <div class="dupe-warn" id="dupeWarn" data-i18n="dupeWarn">⚠ DUPLIKAT na tem pasu!</div>
      <div class="missing-warn" id="missingWarn">
        <span id="missingWarnText"></span>
        <button class="btn" style="padding:1px 8px;font-size:.72rem;border-color:var(--danger);color:var(--danger);background:transparent;min-height:auto;line-height:1.6;cursor:pointer" onclick="logQso(true)" data-i18n="btnSaveAnyway">Shrani vseeno</button>
      </div>
    </div>

    <!-- Main input row -->
    <div class="qf-main">
      <div class="qf-call">
        <div class="qf-lbl" data-i18n="lblCall">Klicni znak</div>
        <div class="call-wrap">
          <input class="qinp" id="inCall" autocomplete="off" autocorrect="off" spellcheck="false"
            inputmode="text" autocapitalize="characters"
            placeholder="CALL" oninput="onCallInput()" onkeydown="onCallKey(event)">
          <div class="acdrop" id="acDrop"></div>
        </div>
      </div>
      <div class="qf-wwl">
        <div class="qf-lbl-row">
          <span class="qf-lbl" data-i18n="lblWwl">WWL</span>
          <div class="loc-hint" id="locHint">
            <span class="lh-lbl">↳</span>
            <span class="lh-val" id="lhVal"></span>
            <span class="lh-cnt" id="lhCnt"></span>
          </div>
        </div>
        <input class="qinp wwl" id="inWwl" autocomplete="off" autocorrect="off" spellcheck="false"
          inputmode="text" autocapitalize="characters"
          placeholder="JN65ar" maxlength="6"
          oninput="onWwlInput()" onkeydown="onWwlKey(event)">
      </div>
      <div class="qf-mode">
        <div class="qf-lbl" data-i18n="lblMode">Način</div>
        <select class="qsel" id="inMode" onchange="onModeChange()">
          <option value="SSB">SSB</option>
          <option value="CW">CW</option>
          <option value="FM">FM</option>
          <option value="AM">AM</option>
          <option value="RTTY">RTTY</option>
        </select>
      </div>
      <div class="qf-rst">
        <div class="qf-lbl" data-i18n="lblRstS">RST↑</div>
        <input class="qinp-sm" id="inRstS" value="59" maxlength="3" inputmode="numeric" onkeydown="onRstKey(event,'inRstR')">
      </div>
      <div class="qf-rst">
        <div class="qf-lbl" data-i18n="lblRstR">RST↓</div>
        <input class="qinp-sm" id="inRstR" value="59" maxlength="3" inputmode="numeric" onkeydown="onRstKey(event,'inNrR')">
      </div>
      <div class="qf-nrr">
        <div class="qf-lbl" data-i18n="lblNrR">Nr↓</div>
        <input class="qinp-sm" id="inNrR" maxlength="4" inputmode="numeric" onkeydown="onNrRKey(event)" oninput="onNrRInput()">
      </div>
      <button class="btn btn-success" onclick="logQso()" style="align-self:flex-end;min-height:44px;padding:.4rem 1.1rem;white-space:nowrap;flex-shrink:0" data-i18n="btnLog">✓ Zapiši QSO</button>
    </div>

    <!-- Info row: auto serial + clock (normal) / UTC edit fields (edit mode) -->
    <div class="qf-info">
      <span class="qf-lbl" data-i18n="lblNrS">Nr↑</span>
      <span class="qf-nr-val" id="inNrS">—</span>
      <div style="flex:1"></div>
      <!-- Live clock — hidden in edit mode -->
      <span id="clockRow" style="display:flex;align-items:center;gap:.4rem">
        <span class="qf-lbl">UTC</span>
        <span class="utc-v" id="utcDisp">--:--</span>
        <button class="btn-icon" id="btnTimeOvr" onclick="toggleTimeOvr()" title="Ročni čas / Manual time" style="margin-left:.2rem;padding:1px 5px;font-size:11px;min-height:24px">✎</button>
        <span class="time-ovr" id="timeOvr">
          <span class="ovr-lbl" data-i18n="ovrLabel">→</span>
          <input class="ovr-inp" id="inManualTime" placeholder="HH:MM" maxlength="5"
            oninput="onManualTimeInput()"
            onkeydown="if(event.key==='Enter'||event.key==='Tab'){event.preventDefault();document.getElementById('inCall').focus();}">
        </span>
        <span class="qf-lbl" style="margin-left:.4rem" data-i18n="lblLocal">lok.</span>
        <span class="local-v" id="localDisp">--:--</span>
      </span>
      <!-- Editable UTC — shown in edit mode -->
      <span id="editTimeRow" style="display:none;align-items:center;gap:.4rem">
        <span class="qf-lbl" data-i18n="lblUtcDate">Datum UTC:</span>
        <input class="edit-utc" id="editUtcDate" placeholder="YYYYMMDD" maxlength="8" style="width:94px">
        <span class="qf-lbl" data-i18n="lblUtcTime">Čas UTC:</span>
        <input class="edit-utc" id="editUtcTime" placeholder="HH:MM" maxlength="5" style="width:60px">
      </span>
    </div>
  </div>
</div>

<!-- EXPORT MODAL -->
<div class="modal-bg" id="exportModal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-title" data-i18n="exportTitle">Izvoz EDI</div>
    <div id="exportRows"></div>
    <div style="margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border);display:flex;gap:.5rem;flex-wrap:wrap">
      <button class="btn btn-secondary btn-sm" id="btnZipExport" onclick="exportAllZip()" data-i18n="btnExportAll">⬇ Vsi pasovi (ZIP)</button>
    </div>
    <div style="margin-top:.65rem">
      <button class="btn btn-secondary btn-sm" onclick="closeModal()" data-i18n="btnClose">✕ Zapri</button>
    </div>
  </div>
</div>
<input type="file" id="importInput" accept=".edi,.txt" style="display:none" onchange="handleImportFile(this)">

<div id="toast" aria-live="polite"></div>

function locToLatLon(loc){
  if(!loc || !/^[A-R]{2}[0-9]{2}[A-X]{2}$/i.test(loc)) return null;
  const s = loc.toUpperCase();
  const lon = (s.charCodeAt(0)-65)*20 + (s.charCodeAt(2)-48)*2 + (s.charCodeAt(4)-65)*5/60 + 2.5/60 - 180;
  const lat = (s.charCodeAt(1)-65)*10 + (s.charCodeAt(3)-48)   + (s.charCodeAt(5)-65)*2.5/60 + 1.25/60 - 90;
  return {lat, lon};
}
function haversine(la1,lo1,la2,lo2){
  const R=6371, dL=(la2-la1)*Math.PI/180, dO=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dL/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)**2;
  return Math.round(R*2*Math.asin(Math.sqrt(a)));
}
function calcBearing(la1,lo1,la2,lo2){
  const dO=(lo2-lo1)*Math.PI/180;
  const y=Math.sin(dO)*Math.cos(la2*Math.PI/180);
  const x=Math.cos(la1*Math.PI/180)*Math.sin(la2*Math.PI/180)-Math.sin(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.cos(dO);
  return Math.round((Math.atan2(y,x)*180/Math.PI+360)%360);
}

function htmlEsc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function baseCall(c){
  const u=c.toUpperCase(), i=u.lastIndexOf('/');
  if(i<=0) return u;
  return /\d/.test(u.slice(0,i)) ? u.slice(0,i) : u;
}
function levenshtein(a,b,mx){
  const na=a.length,nb=b.length;
  if(Math.abs(na-nb)>mx) return mx+1;
  let prev=Array.from({length:nb+1},(_,i)=>i);
  for(let i=1;i<=na;i++){
    const cur=[i]; let rm=i;
    for(let j=1;j<=nb;j++){
      const v=Math.min(prev[j]+1,cur[j-1]+1,prev[j-1]+(a[i-1]===b[j-1]?0:1));
      cur.push(v); if(v<rm) rm=v;
    }
    if(rm>mx) return mx+1; prev=cur;
  }
  return prev[nb];
}
function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

const _histDB = new Map();
let _baselineCalls=0, _baselineVer='', _baselineRaw=null;
const BASELINE_WEIGHT=3;

function applyBaseline(json){
  if(!json||!json.c) return;
  let cnt=0;
  for(const call of Object.keys(json.c)){
    cnt++;
    if(!_histDB.has(call)) _histDB.set(call,{locators:new Map(),locatorsRaw:new Map(),total:0,totalRaw:0});
    const e=_histDB.get(call);
    for(const idxStr of Object.keys(json.c[call])){
      for(const li of json.c[call][idxStr]){
        const loc=li[0].toUpperCase(), raw=li[1], w=raw*BASELINE_WEIGHT;
        e.total+=w; e.totalRaw+=raw;
        e.locators.set(loc,(e.locators.get(loc)||0)+w);
        e.locatorsRaw.set(loc,(e.locatorsRaw.get(loc)||0)+raw);
      }
    }
  }
  _baselineCalls=cnt; _baselineVer=json.v||'';
}

async function loadBaseline(){
  try{
    const r=await fetch('./crosscheck-baseline.json');
    if(!r.ok) return;
    const j=await r.json();
    _baselineRaw=j; applyBaseline(j);
    const tag=document.getElementById('homeBaseTag');
    tag.textContent=t('baseLineShort',{n:_baselineCalls});
    tag.style.display='';
  } catch(e){}
}

function getModeLocRaw(entry){
  if(!entry||!entry.locatorsRaw.size) return null;
  const s=[...entry.locatorsRaw.entries()].sort((a,b)=>b[1]-a[1]);
  return {loc:s[0][0],count:s[0][1],total:entry.totalRaw};
}

function lookupCall(call){
  const base=baseCall(call.toUpperCase());
  const e=_histDB.get(base);
  if(e&&e.totalRaw>0){
    const ml=getModeLocRaw(e);
    return {found:true,modeLoc:ml?.loc||'',modeCount:ml?.count||0,total:e.totalRaw};
  }
  const similar=[];
  for(const[k,ev] of _histDB){
    const d=levenshtein(base,k,2);
    if(d>0&&d<=2){
      const ml=getModeLocRaw(ev);
      similar.push({call:k,dist:d,total:ev.totalRaw,modeLoc:ml?.loc||''});
    }
  }
  similar.sort((a,b)=>a.dist-b.dist||b.total-a.total);
  return {found:false,similar:similar.slice(0,3)};
}

function searchCalls(prefix){
  if(!prefix||prefix.length<2) return [];
  const p=prefix.toUpperCase();
  const res=[];
  for(const[call,e] of _histDB){
    if(call.startsWith(p)){
      const ml=getModeLocRaw(e);
      res.push({call,total:e.totalRaw,modeLoc:ml?.loc||''});
    }
  }
  res.sort((a,b)=>b.total-a.total);
  return res.slice(0,6);
}

function loadSessions(){
  try{
    const raw=JSON.parse(localStorage.getItem(STORE)||'[]');
    _sessions=Array.isArray(raw)?raw.filter(s=>
      s&&typeof s==='object'&&
      typeof s.id==='string'&&_SAFE_ID.test(s.id)&&
      typeof s.myCall==='string'&&
      Array.isArray(s.bands)&&Array.isArray(s.qsos)
    ):[];
  }catch{ _sessions=[]; }
}
function saveSessions(){
  try{ localStorage.setItem(STORE,JSON.stringify(_sessions)); }
  catch(e){ showToast(t('errStorageFull'),true); }
}
function syncCurrent(){
  if(!_current) return;
  _current.modified=Date.now();
  const i=_sessions.findIndex(s=>s.id===_current.id);
  if(i>=0) _sessions[i]=_current; else _sessions.push(_current);
  saveSessions();
}

function exportBackup(){
  const payload=JSON.stringify({app:'vhf-logger',v:1,date:new Date().toISOString(),sessions:_sessions},null,2);
  const d=new Date().toISOString().slice(0,10);
  dl(payload,`vhf-logger-backup-${d}.json`,'application/json');
  showToast(t('toastBackupDone'));
}

const _SAFE_ID=/^[a-z0-9]+$/;
function validateBackup(obj){
  if(!obj||typeof obj!=='object'||Array.isArray(obj)) return null;
  if(obj.app!=='vhf-logger') return null;
  if(!Array.isArray(obj.sessions)) return null;
  for(const s of obj.sessions){
    if(!s||typeof s!=='object') return null;
    if(typeof s.id!=='string'||!_SAFE_ID.test(s.id)) return null;
    if(typeof s.myCall!=='string') return null;
    if(!Array.isArray(s.bands)||!Array.isArray(s.qsos)) return null;
    for(const q of s.qsos){
      if(!q||typeof q!=='object') return null;
      if(typeof q._id!=='string'||!_SAFE_ID.test(q._id)) return null;
      if(typeof q.band!=='string'||typeof q.call!=='string') return null;
    }
  }
  return obj.sessions;
}

function triggerRestore(){
  document.getElementById('restoreInput').value='';
  document.getElementById('restoreInput').click();
}

function handleRestoreFile(input){
  const file=input.files[0];
  if(!file) return;
  if(file.size>10_000_000){ showToast(t('errRestoreInvalid'),true); return; }
  const reader=new FileReader();
  reader.onload=e=>{
    let obj;
    try{ obj=JSON.parse(e.target.result); }
    catch{ showToast(t('errRestoreInvalid'),true); return; }
    const sessions=validateBackup(obj);
    if(!sessions){ showToast(t('errRestoreInvalid'),true); return; }
    if(!confirm(t('confirmRestore',{n:sessions.length}))) return;
    _sessions=sessions;
    saveSessions();
    showHome();
    showToast(t('toastRestoreDone',{n:sessions.length}));
  };
  reader.readAsText(file);
}

function renderHome(){
  const el=document.getElementById('logList');
  document.querySelectorAll('[data-i18n]').forEach(e=>e.textContent=t(e.dataset.i18n));
  if(_sessions.length===0){
    el.innerHTML=`<div class="empty-state"><div class="empty-ico">📡</div>`+
      `<div class="empty-title">${htmlEsc(t('noLogs'))}</div>`+
      `<div class="empty-sub">${htmlEsc(t('noLogsSub'))}</div></div>`;
    return;
  }
  el.innerHTML=[..._sessions].reverse().map(s=>{
    const bStats={};
    for(const q of s.qsos){
      if(!bStats[q.band]) bStats[q.band]={qso:0,km:0};
      bStats[q.band].qso++; bStats[q.band].km+=q.qrb||0;
    }
    const chips=Object.entries(bStats).map(([b,st])=>
      `<span class="bchip"><b>${htmlEsc(b)}</b> <span class="bc">${st.qso}</span> `+
      `<span class="bk">${Math.round(st.km).toLocaleString()}km</span></span>`
    ).join('');
    const mod=new Date(s.modified).toLocaleDateString(_lang==='sl'?'sl-SI':'en-GB');
    return `<div class="log-card">
      <div class="lc-title"><span class="lc-call">${htmlEsc(s.myCall)}</span><span>${htmlEsc(s.contest)}</span></div>
      <div class="lc-meta"><span>${htmlEsc(s.myLoc)}</span><span>${mod}</span><span>${s.qsos.length} QSO</span></div>
      <div class="lc-bands">${chips||'—'}</div>
      <div class="lc-act">
        <button class="btn btn-primary btn-sm" data-action="resume" data-id="${htmlEsc(s.id)}">${t('btnCont')}</button>
        <button class="btn btn-secondary btn-sm" data-action="export" data-id="${htmlEsc(s.id)}">⬇ EDI</button>
        <button class="btn btn-danger btn-sm" data-action="delete" data-id="${htmlEsc(s.id)}" aria-label="${t('ariaDelLog')} ${htmlEsc(s.myCall)}">${t('btnDel')}</button>
      </div>
    </div>`;
  }).join('');
}

function resumeSession(id){

function deleteSession(id){
  const s=_sessions.find(x=>x.id===id);

  _sessions=_sessions.filter(x=>x.id!==id);

}

function collectSetup(){
  const myCall=document.getElementById('fMyCall').value.trim().toUpperCase();
  const myLoc=document.getElementById('fMyLoc').value.trim().toUpperCase();
  const contest=document.getElementById('fContest').value.trim();
  const operator=document.getElementById('fOperator').value.trim().toUpperCase()||myCall;
  const club=document.getElementById('fClub').value.trim().toUpperCase();
  const sect=document.getElementById('fSect').value.trim().toUpperCase();
  const qthName=document.getElementById('fQthName').value.trim();
  const rCall=document.getElementById('fRCall').value.trim().toUpperCase();
  const rName=document.getElementById('fRName').value.trim();
  const rCity=document.getElementById('fRCity').value.trim();
  const rCoun=document.getElementById('fRCoun').value.trim().toUpperCase();
  const rEmail=document.getElementById('fREmail').value.trim();
  if(!myCall){ showToast(t('errNoMyCall'),true); return null; }
  if(!/^[A-R]{2}[0-9]{2}[A-X]{2}$/i.test(myLoc)){ showToast(t('errNoMyLoc'),true); return null; }
  if(!contest){ showToast(t('errNoContest'),true); return null; }
  const bands=[];
  for(const row of document.querySelectorAll('.brow')){
    const sel=row.querySelector('select');
    const [fInp,pInp,aInp]=row.querySelector('.brow-main').querySelectorAll('input');
    const [txInp,rxInp,hInp]=row.querySelector('.brow-eq').querySelectorAll('input');
    if(sel&&sel.value) bands.push({
      band:sel.value,freq:fInp.value.trim(),power:parseInt(pInp.value)||100,antenna:aInp.value.trim(),
      txEq:txInp.value.trim(),rxEq:rxInp.value.trim(),antH:hInp.value.trim(),
    });
  }
  if(bands.length===0){ showToast(t('errNoBand'),true); return null; }
  return {myCall,myLoc,contest,operator,club,sect,qthName,rCall,rName,rCity,rCoun,rEmail,bands};
}

function startSession(){
  const cfg=collectSetup();
  if(!cfg) return;
  if(_editingExisting){
    const newActiveBand=cfg.bands.find(b=>b.band===_current.activeBand)
      ? _current.activeBand : cfg.bands[0].band;
    Object.assign(_current,{
      contest:cfg.contest,myCall:cfg.myCall,myLoc:cfg.myLoc,
      operator:cfg.operator,club:cfg.club,sect:cfg.sect,
      qthName:cfg.qthName,rCall:cfg.rCall,rName:cfg.rName,
      rCity:cfg.rCity,rCoun:cfg.rCoun,rEmail:cfg.rEmail,
      bands:cfg.bands,activeBand:newActiveBand,
    });
    _editingExisting=false;
    syncCurrent();
    const btn=document.querySelector('[data-i18n="btnSaveSetup"]');
    if(btn){btn.textContent=t('btnStart');btn.dataset.i18n='btnStart';}
    showLogger(_current);
    return;
  }
  const session={
    id:genId(),
    contest:cfg.contest,
    myCall:cfg.myCall,
    myLoc:cfg.myLoc,
    operator:cfg.operator,
    club:cfg.club,
    sect:cfg.sect,
    qthName:cfg.qthName,
    rCall:cfg.rCall,
    rName:cfg.rName,
    rCity:cfg.rCity,
    rCoun:cfg.rCoun,
    rEmail:cfg.rEmail,
    created:Date.now(),
    modified:Date.now(),
    activeBand:cfg.bands[0].band,
    bands:cfg.bands,
    qsos:[],
  };
  _sessions.push(session);
  saveSessions();
  showLogger(session);
}

function nextSerial(band){
  if(!_current) return 1;
  const used=_current.qsos.filter(q=>q.band===band).map(q=>q.nrS);
  return used.length===0 ? 1 : Math.max(...used)+1;
}
function isDupe(call,band,excludeId){
  if(!_current) return false;
  const bc=baseCall(call);
  return _current.qsos.some(q=>q.band===band&&baseCall(q.call)===bc&&q._id!==excludeId);
}
function recalcDupes(){
  if(!_current) return;
  const seen=new Map();
  for(const q of _current.qsos){
    if(!seen.has(q.band)) seen.set(q.band,new Set());
    const bc=baseCall(q.call);
    q.dupe=seen.get(q.band).has(bc);
    seen.get(q.band).add(bc);
  }
}
function updateNrS(){
  const el=document.getElementById('inNrS');
  if(el&&_current) el.textContent=String(nextSerial(_current.activeBand)).padStart(3,'0');
}

function switchBand(band){
  if(!_current) return;
  if(_editingQso) cancelEdit();
  _current.activeBand=band;
  renderBandTabs();
  updateNrS();
  resetForm();
  renderTable();
}

function renderBandTabs(){
  if(!_current) return;
  const el=document.getElementById('bandTabs');
  el.innerHTML=_current.bands.map(b=>{
    const n=_current.qsos.filter(q=>q.band===b.band).length;
    const active=b.band===_current.activeBand;
    const col=BAND_COLORS[b.band]||'var(--accent)';
    const style=active?`border-color:${col};color:${col};background:${col}22`:'';
    return `<button class="btab${active?' active':''}" style="${style}" onclick="switchBand('${b.band}')">${htmlEsc(b.band)}<span class="tn">${n}</span></button>`;
  }).join('');
}

function renderStats(){
  if(!_current) return;
  const qsos=_current.qsos;
  const totalQso=qsos.length;
  const totalKm=qsos.reduce((s,q)=>s+(q.qrb||0),0);
  const squares=new Set(qsos.filter(q=>q.wwl&&q.wwl.length===6).map(q=>q.wwl.slice(0,4).toUpperCase())).size;
  const maxKm=qsos.reduce((m,q)=>Math.max(m,q.qrb||0),0);
  document.getElementById('stQso').textContent=totalQso;
  document.getElementById('stKm').textContent=Math.round(totalKm).toLocaleString();
  document.getElementById('stSq').textContent=squares;
  document.getElementById('stODX').textContent=maxKm>0?Math.round(maxKm).toLocaleString():'—';
  renderStatsDetail();
}

function renderTable(){
  if(!_current) return;
  const filt=document.getElementById('tblFilt');
  // rebuild band filter options
  const bands=[..._current.bands.map(b=>b.band)];
  const curFilt=filt.value;
  filt.innerHTML=`<option value="">${t('fAllBands')}</option>`+
    bands.map(b=>`<option value="${b}"${b===curFilt?' selected':''}>${htmlEsc(b)}</option>`).join('');
  filt.value=curFilt;

  const activeBand=filt.value;
  const pool=activeBand ? _current.qsos.filter(q=>q.band===activeBand) : _current.qsos;
  const rows=[...pool]; // chronological: newest at bottom (chat-style)

  document.getElementById('tHead').innerHTML=
    `<th>${t('thNr')}</th><th>${t('thCall')}</th><th>${t('thWwl')}</th>`+
    `<th>${t('thMode')}</th><th>${t('thBand')}</th><th>${t('thKm')}</th>`+
    `<th>${t('thBrg')}</th><th>${t('thRst')}</th><th>${t('thNrQ')}</th><th>${t('thUtc')}</th><th>${t('thDel')}</th>`;

  document.getElementById('tBody').innerHTML=rows.map(q=>{
    const isEditing=_editingQso&&_editingQso._id===q._id;
    const cls=(q.dupe?'is-dup ':'')+((q.xFlags&&q.xFlags.length)?'is-xf ':'')+( isEditing?'editing':'');
    const mdCls=q.mode==='CW'?'cw':q.mode==='FM'?'fm':'ssb';
    const dupBadge=q.dupe?`<span class="mdg mdg-dup">DUP</span>`:'';
    const xBadge=(q.xFlags&&q.xFlags.length)?`<span class="mdg mdg-x">!</span>`:'';
    const utc=`${q.utcDate.slice(6)}/${q.utcDate.slice(4,6)} ${q.utcTime.slice(0,2)}:${q.utcTime.slice(2)}`;
    return `<tr class="${cls}" data-qid="${q._id}">
      <td class="num">${q.nrS}</td>
      <td class="call">${htmlEsc(q.call)}${dupBadge}${xBadge}</td>
      <td class="loc">${htmlEsc(q.wwl||'—')}</td>
      <td><span class="mdg mdg-${mdCls}">${htmlEsc(q.mode)}</span></td>
      <td>${htmlEsc(q.band)}</td>
      <td class="km">${q.qrb?Math.round(q.qrb).toLocaleString():'—'}</td>
      <td class="num">${q.brg!==null&&q.brg!==undefined?q.brg+'°':'—'}</td>
      <td class="num">${htmlEsc(q.rstS)}/${htmlEsc(q.rstR)}</td>
      <td class="num">${String(q.nrS).padStart(3,'0')}/${String(q.nrR||0).padStart(3,'0')}</td>
      <td class="num" style="color:var(--dim);font-size:10px">${htmlEsc(utc)}</td>
      <td><button class="btn-del" aria-label="${t('ariaDelQso')} ${htmlEsc(q.call)}" title="${t('ariaDelQso')} ${htmlEsc(q.call)}">✕</button></td>
    </tr>`;
  }).join('');
  document.getElementById('tblCnt').textContent=`${rows.length} QSO`;
}
function scrollTableBottom(){
  const w=document.getElementById('tblWrap');
  if(w) w.scrollTop=w.scrollHeight;
}

function editQso(qsoId){
  if(!_current) return;
  const q=_current.qsos.find(x=>x._id===qsoId);
  if(!q) return;
  document.getElementById('missingWarn').className='missing-warn';
  document.getElementById('inWwl').className='qinp wwl';
  document.getElementById('inNrR').className='qinp-sm';
  _editingQso=q;
  document.getElementById('inCall').value=q.call;
  document.getElementById('inWwl').value=q.wwl||'';
  document.getElementById('inMode').value=q.mode||'SSB';
  document.getElementById('inRstS').value=q.rstS||'59';
  document.getElementById('inRstR').value=q.rstR||'59';
  document.getElementById('inNrR').value=q.nrR||'';
  // Switch info row: hide live clock, show editable UTC fields
  document.getElementById('clockRow').style.display='none';
  document.getElementById('editTimeRow').style.display='flex';
  document.getElementById('editUtcDate').value=q.utcDate||'';
  const tt=q.utcTime||'0000';
  document.getElementById('editUtcTime').value=tt.slice(0,2)+':'+tt.slice(2);
  // Show own serial in Nr↑ field instead of next-serial
  const nrEl=document.getElementById('inNrS');
  if(nrEl) nrEl.textContent='#'+q.nrS;
  // Show edit bar and rename button
  document.getElementById('editBar').style.display='';
  document.getElementById('editBadge').textContent=t('editBadge')+' #'+q.nrS+' '+q.call;
  const btn=document.querySelector('[data-i18n="btnLog"]');
  if(btn){ btn.textContent=t('btnSaveEdit'); btn.dataset.i18n='btnSaveEdit'; }
  renderTable();
  updateXhint(q.call); updateLocHint(); checkDupeField();
  document.getElementById('inCall').focus();
}

function cancelEdit(){
  _editingQso=null;
  document.getElementById('editBar').style.display='none';
  document.getElementById('clockRow').style.display='flex';
  document.getElementById('editTimeRow').style.display='none';
  const btn=document.querySelector('[data-i18n="btnSaveEdit"]');
  if(btn){ btn.textContent=t('btnLog'); btn.dataset.i18n='btnLog'; }
  resetForm();
  renderTable();
}

function saveEditedQso(){
  const call=document.getElementById('inCall').value.trim().toUpperCase();
  if(!call){ showToast(t('errNoCall'),true); return; }
  const wwlRaw=document.getElementById('inWwl').value.trim().toUpperCase();
  const wwl=wwlRaw.length===6 ? wwlRaw.slice(0,4)+wwlRaw.slice(4).toLowerCase() : wwlRaw;
  const myPos=locToLatLon(_current.myLoc);
  const thPos=locToLatLon(wwl);
  const qrb=(myPos&&thPos)?haversine(myPos.lat,myPos.lon,thPos.lat,thPos.lon):(_editingQso.qrb||0);
  const brg=(myPos&&thPos)?calcBearing(myPos.lat,myPos.lon,thPos.lat,thPos.lon):_editingQso.brg;
  const rawDate=document.getElementById('editUtcDate').value.trim().replace(/\D/g,'')||_editingQso.utcDate;
  const rawTime=document.getElementById('editUtcTime').value.trim().replace(/\D/g,'')||_editingQso.utcTime;
  const utcDate=rawDate.slice(0,8).padEnd(8,'0');
  const utcTime=rawTime.slice(0,4).padEnd(4,'0');
  const mode=document.getElementById('inMode').value;
  const xFlags=[];
  if(_baselineCalls>0&&wwl.length===6){
    const lk=lookupCall(call);
    if(lk.found&&lk.modeLoc&&lk.modeLoc!==wwl.toUpperCase()){
      xFlags.push({type:'LOC_MISMATCH',histLoc:lk.modeLoc});
    } else if(!lk.found&&lk.similar&&lk.similar.length){
      xFlags.push({type:'CALL_SIMILAR',similar:lk.similar.slice(0,2)});
    }
  }
  Object.assign(_editingQso,{
    call, wwl, mode,
    rstS:document.getElementById('inRstS').value||(mode==='CW'?'599':'59'),
    rstR:document.getElementById('inRstR').value||(mode==='CW'?'599':'59'),
    nrR:parseInt(document.getElementById('inNrR').value)||0,
    utcDate, utcTime, qrb, brg, xFlags,
  });
  recalcDupes();
  const saved=_editingQso;
  _editingQso=null;
  syncCurrent();
  document.getElementById('editBar').style.display='none';
  document.getElementById('clockRow').style.display='flex';
  document.getElementById('editTimeRow').style.display='none';
  const btn=document.querySelector('[data-i18n="btnSaveEdit"]');
  if(btn){ btn.textContent=t('btnLog'); btn.dataset.i18n='btnLog'; }
  renderTable(); renderStats();
  showToast(t('toastEdited'));
  // Scroll to the edited row
  const row=document.querySelector(`tr[data-qid="${saved._id}"]`);
  if(row) row.scrollIntoView({block:'nearest'});
  resetForm();
}

// Row click → edit (set up once after page load)
function setupTableClickHandler(){
  document.getElementById('tBody').addEventListener('click',function(e){
    const del=e.target.closest('.btn-del');
    if(del){
      const row=del.closest('tr[data-qid]');
      if(row) deleteQso(row.dataset.qid);
      return;
    }
    const row=e.target.closest('tr[data-qid]');
    if(row) editQso(row.dataset.qid);
  });
}

function deleteQso(id){
  if(!_current) return;
  const q=_current.qsos.find(x=>x._id===id);
  if(!q) return;
  if(!confirm(t('confirmDelQso',{call:q.call}))) return;
  if(_editingQso&&_editingQso._id===id) cancelEdit();
  _current.qsos=_current.qsos.filter(x=>x._id!==id);
  recalcDupes();
  syncCurrent(); renderTable(); renderStats(); renderBandTabs(); updateNrS();
  showToast(t('toastDelQso'));
}

let _acCallLookup=null; // cached lookup result for current call

function onCallInput(){
  const v=document.getElementById('inCall').value.toUpperCase();
  document.getElementById('inCall').value=v;
  _acIdx=-1;
  const items=_baselineCalls>0 ? searchCalls(v) : [];
  _acItems=items;
  renderAc(items);
  _acCallLookup=null;
  updateLocHint();
  debouncedXhint(v);
  checkDupeField();
}

function renderAc(items){
  const drop=document.getElementById('acDrop');
  if(!items.length){ drop.className='acdrop'; return; }
  drop.innerHTML=items.map((it,i)=>
    `<div class="aci" data-i="${i}" onclick="selectAc(${i})">
       <span class="aci-call">${htmlEsc(it.call)}</span>
       <span class="aci-loc">${htmlEsc(it.modeLoc.slice(0,4)+(it.modeLoc.length===6?it.modeLoc.slice(4).toLowerCase():''))}</span>
       <span class="aci-cnt">×${it.total}</span>
     </div>`
  ).join('');
  drop.className='acdrop open';
}

function selectAc(i){
  if(i<0||i>=_acItems.length) return;
  const it=_acItems[i];
  document.getElementById('inCall').value=it.call;
  document.getElementById('acDrop').className='acdrop';
  _acItems=[]; _acIdx=-1;
  _acCallLookup={found:true,modeLoc:it.modeLoc,modeCount:it.total,total:it.total};
  if(it.modeLoc){
    const raw=it.modeLoc;
    const loc=raw.length===6 ? raw.slice(0,4).toUpperCase()+raw.slice(4).toLowerCase() : raw.toUpperCase();
    document.getElementById('inWwl').value=loc;
    onWwlInput();
  }
  updateLocHint(); updateXhint(it.call); checkDupeField();
  document.getElementById('inWwl').focus();
}

function onCallKey(e){
  const drop=document.getElementById('acDrop');
  if(!drop.classList.contains('open')){
    if(e.key==='Tab'||e.key==='Enter'){ e.preventDefault(); document.getElementById('inWwl').focus(); }
    return;
  }
  if(e.key==='ArrowDown'){ e.preventDefault(); _acIdx=Math.min(_acIdx+1,_acItems.length-1); highlightAc(); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); _acIdx=Math.max(_acIdx-1,-1); highlightAc(); }
  else if(e.key==='Enter'||e.key==='Tab'){
    e.preventDefault();
    if(_acIdx>=0) selectAc(_acIdx);
    else { drop.className='acdrop'; document.getElementById('inWwl').focus(); }
  } else if(e.key==='Escape'){ drop.className='acdrop'; }
}

function highlightAc(){
  document.querySelectorAll('.aci').forEach((el,i)=>el.classList.toggle('hi',i===_acIdx));
}

function updateLocHint(){
  if(!_current) return;
  const call=document.getElementById('inCall').value.trim().toUpperCase();
  const hint=document.getElementById('locHint');
  if(!call||_baselineCalls===0){ hint.className='loc-hint'; return; }
  const lk=_acCallLookup||(lookupCall(call));
  if(lk.found&&lk.modeLoc){
    const locDisp=lk.modeLoc.slice(0,4)+(lk.modeLoc.length===6?lk.modeLoc.slice(4).toLowerCase():'');
    document.getElementById('lhVal').textContent=locDisp;
    document.getElementById('lhCnt').textContent='×'+lk.total;
    hint.className='loc-hint show';
  } else {
    hint.className='loc-hint';
  }
}

function calcAzimuth(locStr){
  if(!_current||!locStr||locStr.length<6) return null;
  const my=locToLatLon(_current.myLoc);
  const th=locToLatLon(locStr);
  if(!my||!th) return null;
  return calcBearing(my.lat,my.lon,th.lat,th.lon);
}

function updateXhint(call){
  const el=document.getElementById('xhint');
  const row=document.getElementById('xhRow');
  const wwlNow=document.getElementById('inWwl').value.trim();
  const hasWwl=wwlNow.length===6;
  const hasBL=_baselineCalls>0;

  if(!call){ el.className='xhint'; return; }

  const lk=hasBL ? lookupCall(call) : {found:false,similar:[]};
  const parts=[];

  // ── call history ──
  if(hasBL){
    if(lk.found){
      const ld=lk.modeLoc.slice(0,4)+(lk.modeLoc.length===6?lk.modeLoc.slice(4).toLowerCase():'');
      parts.push(`<span class="xh-lbl">${t('xhHist')}</span>`+
        `<span class="xh-val">${htmlEsc(ld)}</span>`+
        `<span class="xbadge xb-ok">×${lk.total}</span>`);
    } else if(lk.similar&&lk.similar.length){
      const sim=lk.similar.slice(0,2).map(s=>`<span class="xbadge xb-warn">${htmlEsc(s.call)}</span>`).join(' ');
      parts.push(`<span class="xh-lbl">${t('xhSim')}</span>${sim}`);
    } else if(call.length>=3){
      parts.push(`<span class="xbadge xb-dim">${t('xhNone')}</span>`);
    }
  }

  // ── azimuth ──
  if(hasWwl){
    // confirmed azimuth from entered locator (green)
    const az=calcAzimuth(wwlNow);
    if(az!==null) parts.push(`<span class="xbadge xb-ok" style="font-size:.8rem;padding:2px 7px">⟹ ${az}°</span>`);
  } else if(lk.found&&lk.modeLoc){
    // approximate azimuth from baseline (muted)
    const az=calcAzimuth(lk.modeLoc);
    if(az!==null) parts.push(`<span class="xbadge xb-dim" style="font-size:.8rem;padding:2px 7px">~ ${az}°</span>`);
  }

  if(!parts.length){ el.className='xhint'; return; }
  row.innerHTML=parts.join('<span style="color:var(--border2);margin:0 .25rem">·</span>');
  el.className='xhint show';
}

function onWwlInput(){
  let v=document.getElementById('inWwl').value.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,6);
  if(v.length===6) v=v.slice(0,4)+v.slice(4).toLowerCase();
  document.getElementById('inWwl').value=v;
  updateWwlColor();
  checkDupeField();
  document.getElementById('missingWarn').className='missing-warn';
  const call=document.getElementById('inCall').value.trim().toUpperCase();
  if(call) debouncedXhint(call);
}

function updateWwlColor(){
  const inp=document.getElementById('inWwl');
  const wwl=inp.value.toUpperCase();
  const lk=_acCallLookup;
  if(!lk||!lk.found||!lk.modeLoc||wwl.length<4){ inp.className='qinp wwl'; return; }
  if(wwl.length===6){
    inp.className='qinp wwl '+(wwl===lk.modeLoc?'ok':'warn');
  } else {
    inp.className='qinp wwl';
  }
}

function onWwlKey(e){
  if(e.key==='Enter'||e.key==='Tab'){
    e.preventDefault();
    document.getElementById('inMode').focus();
  }
}

function onModeChange(){
  const mode=document.getElementById('inMode').value;
  const def=mode==='CW'?'599':'59';
  document.getElementById('inRstS').value=def;
  document.getElementById('inRstR').value=def;
}

function checkDupeField(){
  if(!_current) return;
  const call=document.getElementById('inCall').value.trim().toUpperCase();
  const dupe=call&&isDupe(call,_current.activeBand,_editingQso?._id);
  document.getElementById('dupeWarn').className='dupe-warn'+(dupe?' show':'');
}

function logQso(force=false){
  if(!_current) return;
  if(_editingQso){ saveEditedQso(); return; }
  const call=document.getElementById('inCall').value.trim().toUpperCase();
  if(!call){ showToast(t('errNoCall'),true); return; }
  const wwlRaw=document.getElementById('inWwl').value.trim().toUpperCase();
  const wwl=wwlRaw.length===6 ? wwlRaw.slice(0,4)+wwlRaw.slice(4).toLowerCase() : wwlRaw;
  const nrR=parseInt(document.getElementById('inNrR').value)||0;
  if(!force && (wwl.length!==6 || nrR===0)){
    const mWwl=wwl.length!==6, mNrR=nrR===0;
    const key=mWwl&&mNrR?'warnMissingBoth':mWwl?'warnMissingWwl':'warnMissingNrR';
    document.getElementById('missingWarnText').textContent=t(key);
    document.getElementById('missingWarn').className='missing-warn show';
    if(mWwl) document.getElementById('inWwl').classList.add('field-warn');
    if(mNrR) document.getElementById('inNrR').classList.add('field-warn');
    playWarnBeep();
    return;
  }
  const band=_current.activeBand;
  let utcDate, utcTime;
  if(_manualTime){
    utcDate=_manualTime.date; utcTime=_manualTime.time;
  } else {
    const now=new Date();
    utcDate=`${now.getUTCFullYear()}${String(now.getUTCMonth()+1).padStart(2,'0')}${String(now.getUTCDate()).padStart(2,'0')}`;
    utcTime=`${String(now.getUTCHours()).padStart(2,'0')}${String(now.getUTCMinutes()).padStart(2,'0')}`;
  }
  const myPos=locToLatLon(_current.myLoc);
  const thPos=locToLatLon(wwl);
  const qrb=(myPos&&thPos)?haversine(myPos.lat,myPos.lon,thPos.lat,thPos.lon):0;
  const brg=(myPos&&thPos)?calcBearing(myPos.lat,myPos.lon,thPos.lat,thPos.lon):null;
  const mode=document.getElementById('inMode').value;
  const rstS=document.getElementById('inRstS').value||(mode==='CW'?'599':'59');
  const rstR=document.getElementById('inRstR').value||(mode==='CW'?'599':'59');
  const nrS=nextSerial(band);
  const dupe=isDupe(call,band);

  // Crosscheck flags
  const xFlags=[];
  if(_baselineCalls>0&&wwl.length===6){
    const lk=lookupCall(call);
    if(lk.found&&lk.modeLoc&&lk.modeLoc!==wwl.toUpperCase()){
      xFlags.push({type:'LOC_MISMATCH',histLoc:lk.modeLoc});
    } else if(!lk.found&&lk.similar&&lk.similar.length){
      xFlags.push({type:'CALL_SIMILAR',similar:lk.similar.slice(0,2)});
    }
  }

  const qso={
    _id:genId(),band,mode,call,wwl,rstS,rstR,nrS,nrR,
    utcDate,utcTime,qrb,brg,dupe,xFlags,
  };
  _current.qsos.push(qso);
  syncCurrent();
  renderTable(); renderStats(); renderBandTabs(); updateNrS();
  scrollTableBottom();
  showToast(t('toastAdded',{nr:nrS,km:qrb?Math.round(qrb).toLocaleString():'?'}));
  playQsoBeep();
  resetForm();
  document.getElementById('inCall').focus();
}

function resetForm(){
  document.getElementById('inCall').value='';
  document.getElementById('inWwl').value='';
  document.getElementById('inNrR').value='';
  document.getElementById('inWwl').className='qinp wwl';
  document.getElementById('inNrR').className='qinp-sm';
  document.getElementById('acDrop').className='acdrop';
  document.getElementById('locHint').className='loc-hint';
  document.getElementById('xhint').className='xhint';
  document.getElementById('dupeWarn').className='dupe-warn';

// ════════════════════════════════════════
//  EDI EXPORT
// ════════════════════════════════════════
const MODE_NUM={SSB:1,CW:2,FM:6,AM:5,RTTY:7};

function buildEdi(session,band){
  const bc=session.bands.find(b=>b.band===band)||{};
  const qsos=session.qsos.filter(q=>q.band===band)
    .sort((a,b)=>(a.utcDate+a.utcTime)<(b.utcDate+b.utcTime)?-1:1);
  if(!qsos.length) return null;
  const opt=BAND_OPTS.find(o=>o.band===band);
  const ediBand=opt?opt.edi:(bc.freq?bc.freq+' MHz':band);
  const first=qsos[0];
  const last=qsos[qsos.length-1];

  // C* summary — computed from non-dupe QSOs
  const valid=qsos.filter(q=>!q.dupe);
  const cQSOs=valid.length;
  const cQSOP=valid.reduce((s,q)=>s+Math.round(q.qrb||0),0);
  const wwlSet=new Set(valid.filter(q=>q.wwl&&q.wwl.length>=4).map(q=>q.wwl.slice(0,4).toUpperCase()));
  const cWWLs=wwlSet.size;
  const cExcs=valid.filter(q=>(q.nrR||0)>0).length;
  const dxSet=new Set();
  for(const q of valid){const m=baseCall(q.call).match(/^([A-Z]+[0-9])/);if(m)dxSet.add(m[1]);}
  const cDXCs=dxSet.size;
  // IARU-R1 VHF: total score = sum of QRB × (locator squares + DXCC countries)
  const cToSc=cQSOP*(cWWLs+cDXCs);
  const odx=valid.reduce((best,q)=>(!best||(q.qrb||0)>(best.qrb||0))?q:best,null);
  const cODXC=odx?`${odx.call};${(odx.wwl||'').toUpperCase()};${Math.round(odx.qrb||0)}`:';;0';
  const antH=bc.antH||'';

  let out='[REG1TEST;1]\r\n';
  out+=`TDate=${first.utcDate};${last.utcDate}\r\n`;
  out+=`TCall=${session.myCall}\r\nTLocator=${session.myLoc}\r\n`;
  out+=`TName=${session.operator||session.myCall}\r\n`;
  out+=`RName=${session.contest}\r\nRBand=${ediBand}\r\nRAZ=28\r\nRHBBS=\r\n`;
  out+=`PWWLo=${session.myLoc}\r\nPCall=${session.myCall}\r\nPBand=${ediBand}\r\n`;
  out+=`PSect=${session.sect||''}\r\nPClub=${session.club||''}\r\nRClub=\r\n`;
  out+=`MOpe1=${session.operator||session.myCall}\r\nMOpe2=\r\n`;
  out+=`SPowe=${bc.power||100}\r\nSAnte=${bc.antenna||''}\r\n`;
  out+=`STXEq=${bc.txEq||''}\r\nSRXEq=${bc.rxEq||''}\r\nSAntH=${antH};${antH}\r\n`;
  out+=`CQSOs=${cQSOs};${cWWLs+cDXCs}\r\nCQSOP=${cQSOP}\r\n`;
  out+=`CWWLs=${cWWLs};0;${cWWLs}\r\nCWWLB=0\r\n`;
  out+=`CExcs=${cExcs};0;${cExcs}\r\nCExcB=0\r\n`;
  out+=`CDXCs=${cDXCs};0;${cDXCs}\r\nCDXCB=0\r\n`;
  out+=`CToSc=${cToSc}\r\nCODXC=${cODXC}\r\n`;
  out+='\r\n[Remarks]\r\n\r\n';
  out+=`[QSORecords;${qsos.length}]\r\n`;
  for(const q of qsos){
    const d=q.utcDate.slice(2);
    const mn=MODE_NUM[q.mode]||1;
    const ns=String(q.nrS).padStart(3,'0');
    const nr=String(q.nrR||0).padStart(3,'0');
    const wwl=(q.wwl||'').toUpperCase();
    const qrb=Math.round(q.qrb||0);
    out+=`${d};${q.utcTime};${q.call};${mn};${q.rstS};${ns};${q.rstR};${nr};;${wwl};${qrb};;;;${q.dupe?'D':''}\r\n`;
  }
  return out;
}

function showExportModal(){
  const session=_current;
  if(!session) return;
  _showExportFor(session);

function showExportFor(id){
  const session=_sessions.find(s=>s.id===id);

  _showExportFor(session);
}

function _showExportFor(session){
  _exportingSession=session;
  const bands=[...new Set(session.qsos.map(q=>q.band))];
  if(!bands.length){ showToast(t('errNoBand'),true); return; }
  const rows=bands.map(b=>{
    const n=session.qsos.filter(q=>q.band===b).length;
    const km=session.qsos.filter(q=>q.band===b).reduce((s,q)=>s+(q.qrb||0),0);
    return `<div class="exp-row">
      <span class="exp-band">${htmlEsc(b)}</span>
      <span class="exp-info">${t('expBandInfo',{n,km:Math.round(km).toLocaleString()})}</span>
      <button class="btn btn-primary btn-sm" style="margin-left:auto"
        onclick="_exportBand('${session.id}','${b}')">⬇ EDI</button>
    </div>`;
  });
  document.getElementById('exportRows').innerHTML=rows.join('');
  document.getElementById('exportModal').className='modal-bg open';
}

function _exportBand(sessionId,band){
  const session=_sessions.find(s=>s.id===sessionId)||(_current&&_current.id===sessionId?_current:null);
  if(!session) return;
  const content=buildEdi(session,band);
  if(!content){ showToast(t('errNoBand'),true); return; }
  const slug=`${session.myCall}_${band}_${session.contest}`.replace(/[^\w]/g,'_');
  dl(content,`${slug}.edi`);
  closeModal();
}

function playQsoBeep(){
  if(!_soundEnabled) return;
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880,ctx.currentTime);
    gain.gain.setValueAtTime(0.25,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.12);
    osc.start(); osc.stop(ctx.currentTime+0.12);
    osc.onended=()=>{try{ctx.close();}catch(_){}};
  }catch(e){}
}

function playWarnBeep(){
  if(!_soundEnabled) return;
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0, 0.15].forEach(delay=>{
      const osc=ctx.createOscillator();
      const g=ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.frequency.value=440;
      g.gain.setValueAtTime(0.2,ctx.currentTime+delay);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+0.07);
      osc.start(ctx.currentTime+delay);
      osc.stop(ctx.currentTime+delay+0.07);
    });
    setTimeout(()=>{try{ctx.close();}catch(_){}},500);
  }catch(e){}
}

// ════════════════════════════════════════
//  ZIP EXPORT
// ════════════════════════════════════════
const _crc32=(()=>{
  const T=new Uint32Array(256);
  for(let i=0;i<256;i++){let c=i;for(let j=0;j<8;j++)c=c&1?0xEDB88320^c>>>1:c>>>1;T[i]=c;}
  return buf=>{let c=0xFFFFFFFF;for(const b of buf)c=T[(c^b)&0xFF]^c>>>8;return(c^0xFFFFFFFF)>>>0;};
})();

function makeZip(files){
  const enc=new TextEncoder();
  const u16=(v,a)=>{a.push(v&0xFF,(v>>8)&0xFF);};
  const u32=(v,a)=>{a.push(v&0xFF,(v>>8)&0xFF,(v>>16)&0xFF,(v>>24)&0xFF);};
  const now=new Date();
  const dt=((now.getFullYear()-1980)<<9)|((now.getMonth()+1)<<5)|now.getDate();
  const tm=(now.getHours()<<11)|(now.getMinutes()<<5)|(now.getSeconds()>>1);
  const local=[],central=[];
  let off=0;
  for(const {name,data} of files){
    const nb=enc.encode(name);
    const db=typeof data==='string'?enc.encode(data):data;
    const crc=_crc32(db);
    const sz=db.length;
    const lh=[];
    lh.push(0x50,0x4B,0x03,0x04);
    u16(20,lh);u16(0,lh);u16(0,lh);u16(tm,lh);u16(dt,lh);
    u32(crc,lh);u32(sz,lh);u32(sz,lh);u16(nb.length,lh);u16(0,lh);
    lh.push(...nb,...db);
    const ch=[];
    ch.push(0x50,0x4B,0x01,0x02);
    u16(20,ch);u16(20,ch);u16(0,ch);u16(0,ch);u16(tm,ch);u16(dt,ch);
    u32(crc,ch);u32(sz,ch);u32(sz,ch);u16(nb.length,ch);u16(0,ch);
    u16(0,ch);u16(0,ch);u16(0,ch);u32(0,ch);u32(off,ch);
    ch.push(...nb);
    local.push(lh); central.push(ch); off+=lh.length;
  }
  const cd=central.flat();
  const eocd=[];
  eocd.push(0x50,0x4B,0x05,0x06);
  u16(0,eocd);u16(0,eocd);u16(files.length,eocd);u16(files.length,eocd);
  u32(cd.length,eocd);u32(off,eocd);u16(0,eocd);
  return new Uint8Array([...local.flat(),...cd,...eocd]);
}

function exportAllZip(){
  const session=_exportingSession||_current;
  if(!session) return;
  const bands=[...new Set(session.qsos.map(q=>q.band))];
  if(!bands.length){ showToast(t('errNoBand'),true); return; }
  const files=[];
  for(const b of bands){
    const content=buildEdi(session,b);
    if(content){
      const slug=`${session.myCall}_${b}_${session.contest}`.replace(/[^\w]/g,'_');
      files.push({name:`${slug}.edi`,data:content});
    }
  }
  if(!files.length){ showToast(t('errNoBand'),true); return; }
  const zip=makeZip(files);
  const blob=new Blob([zip],{type:'application/zip'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  const slug=`${session.myCall}_${session.contest}`.replace(/[^\w]/g,'_');
  a.download=`${slug}_EDI.zip`;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),5000);
  closeModal();
}

// ════════════════════════════════════════
//  EDI IMPORT
// ════════════════════════════════════════
function parseEdiForImport(text){
  const lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  const header={};
  const qsos=[];
  let inQso=false;
  const modeMap={'1':'SSB','2':'CW','3':'CW','4':'SSB','5':'AM','6':'FM','7':'RTTY','8':'SSTV','9':'ATV'};
  for(const line of lines){
    const tr=line.trim();
    if(!tr||tr.startsWith(';')) continue;
    if(tr.startsWith('[QSORecords')){ inQso=true; continue; }
    if(tr.startsWith('[')){ inQso=false; continue; }
    if(!inQso){
      const eq=tr.indexOf('=');
      if(eq>0) header[tr.slice(0,eq).trim()]=tr.slice(eq+1).trim();
    } else {
      const f=tr.split(';');
      if(f.length<10) continue;
      const [yymmdd,hhmm,call,mn,rstS,nrS,rstR,nrR,,wwlRaw,qrbRaw,,,,dupeFlag]=f;
      if(!call||call.length<2) continue;
      const yy=parseInt(yymmdd.slice(0,2));
      const utcDate=`${yy>=80?1900+yy:2000+yy}${yymmdd.slice(2)}`;
      const utcTime=(hhmm||'0000').slice(0,4);
      const mode=modeMap[mn]||'SSB';
      const wwl=wwlRaw&&wwlRaw.length===6
        ? wwlRaw.slice(0,4).toUpperCase()+wwlRaw.slice(4).toLowerCase()
        : (wwlRaw||'').toUpperCase();
      qsos.push({
        call:call.toUpperCase(),mode,
        rstS:rstS||(mode==='CW'?'599':'59'),
        rstR:rstR||(mode==='CW'?'599':'59'),
        nrS:parseInt(nrS)||0, nrR:parseInt(nrR)||0,
        wwl, utcDate, utcTime,
        qrb:parseFloat(qrbRaw)||0,
        dupe:dupeFlag==='D',
      });
    }
  }
  return {header,qsos};
}

function triggerImport(){
  const el=document.getElementById('importInput');
  if(el){ el.value=''; el.click(); }
}

function handleImportFile(input){
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{ try{ importEdi(e.target.result); } catch(err){ showToast(t('toastImportErr'),true); } };
  reader.readAsText(file,'utf-8');
}

function importEdi(text){
  if(!_current){ showToast(t('toastImportErr'),true); return; }
  const {header,qsos}=parseEdiForImport(text);
  if(!qsos.length){ showToast(t('toastImportErr'),true); return; }
  const rawBand=header['PBand']||header['RBand']||'';
  const resolved=normBand(rawBand);
  const band=resolved||_current.activeBand;
  if(!rawBand) showToast(t('warnImportBand',{band}));
  if(!_current.bands.some(b=>b.band===band)){
    showToast(t('errImportBand',{band}),true); return;
  }
  if(!confirm(t('confirmImport',{n:qsos.length,band}))) return;
  const myPos=locToLatLon(_current.myLoc);
  let added=0;
  for(const q of qsos){
    const thPos=locToLatLon(q.wwl);
    const qrb=(myPos&&thPos)?haversine(myPos.lat,myPos.lon,thPos.lat,thPos.lon):(q.qrb||0);
    const brg=(myPos&&thPos)?calcBearing(myPos.lat,myPos.lon,thPos.lat,thPos.lon):null;
    _current.qsos.push({
      _id:genId(),band,mode:q.mode,call:q.call,wwl:q.wwl,
      rstS:q.rstS,rstR:q.rstR,nrS:q.nrS,nrR:q.nrR,
      utcDate:q.utcDate,utcTime:q.utcTime,
      qrb,brg,dupe:false,xFlags:[],
    });
    added++;
  }
  recalcDupes();
  syncCurrent();
  renderTable(); renderStats(); renderBandTabs(); updateNrS();
  scrollTableBottom();
  showToast(t('toastImported',{n:added,band}));
}

    document.getElementById('btnEN').classList.add('active');
  }

  loadSessions();
  renderHome();
  loadBaseline();
  setupTableClickHandler();
  document.getElementById('logList').addEventListener('click',function(e){
    const btn=e.target.closest('[data-action]');
    if(!btn) return;
    const id=btn.dataset.id, action=btn.dataset.action;
    if(action==='resume') resumeSession(id);
    else if(action==='export') showExportFor(id);
    else if(action==='delete') deleteSession(id);

  document.addEventListener('keydown',function(e){
    if(!document.getElementById('screen-logger')?.classList.contains('active')) return;

      document.getElementById('acDrop').className='acdrop';
      if(_manualTime){ toggleTimeOvr(); }
    }
  });
}
