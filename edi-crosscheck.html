<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S56OA EDI Crosscheck</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0e14;--bg2:#0f1520;--bg3:#162030;--bg4:#1c2a3a;
  --border:#1e3048;--border2:#254060;--text:#cdd9e5;--muted:#637e96;
  --dim:#3d5a70;--accent:#4d9de0;--accent2:#2ecc8a;--accent3:#f0a500;
  --danger:#e05c4d;--hdr:linear-gradient(135deg,#0a0e14 0%,#0d1a28 100%);
  --call:#79c0ff;--r:6px;
}
html[data-theme="light"] {
  --bg:#f0f4f8;--bg2:#ffffff;--bg3:#e4ecf3;--bg4:#d4e0eb;
  --border:#bfcfdd;--border2:#96b0c6;--text:#18273a;--muted:#4a6275;
  --dim:#7a9ab0;--accent:#1a6fad;--accent2:#178a58;--accent3:#a06800;
  --danger:#c03030;--hdr:linear-gradient(135deg,#dde8f2 0%,#eaf2f8 100%);
  --call:var(--accent);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:14px;min-height:100vh;transition:background-color .2s,color .2s}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

header{
  background:var(--hdr);border-bottom:1px solid var(--border);
  padding:.9rem 1.5rem;display:flex;align-items:center;gap:1rem;
  position:sticky;top:0;z-index:100;backdrop-filter:blur(8px);
}
.logo{font-family:'Space Mono',monospace;font-size:1rem;letter-spacing:-.02em}
.logo .icon{color:var(--accent3);margin:0 .35rem}
.logo .fmt{color:var(--muted)}
.version{font-family:'Space Mono',monospace;font-size:10px;color:var(--dim);
  padding:1px 6px;border:1px solid var(--border);border-radius:3px;white-space:nowrap}
.lang-wrap{margin-left:auto;display:flex;gap:4px}
.lang-btn{background:transparent;border:1px solid var(--border);color:var(--muted);
  border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;cursor:pointer;
  transition:all .15s;font-family:'Space Mono',monospace}
.lang-btn.active{background:var(--bg4);border-color:var(--accent);color:var(--accent)}
.theme-btn{background:transparent;border:1px solid var(--border);color:var(--muted);
  border-radius:4px;padding:2px 7px;font-size:13px;cursor:pointer;line-height:1;transition:all .15s}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}

main{max-width:1400px;margin:0 auto;padding:1.5rem 1.5rem 3rem}

.phase-panel{margin-bottom:.25rem}
.phase-hdr{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem}
.phase-num{
  font-family:'Space Mono',monospace;font-size:11px;font-weight:700;
  background:var(--bg4);border:1px solid var(--border2);padding:2px 8px;
  border-radius:3px;color:var(--muted);white-space:nowrap;
}
.phase-num.active{background:rgba(77,157,224,.15);border-color:var(--accent);color:var(--accent)}
.phase-num.done{background:rgba(46,204,138,.1);border-color:var(--accent2);color:var(--accent2)}
.phase-title{font-size:.9rem;font-weight:600}

.drop-wrap{display:flex;flex-direction:column;align-items:flex-start;gap:.85rem}
.drop-area{
  border:1.5px dashed var(--border2);border-radius:12px;
  padding:2rem 3.5rem;text-align:center;cursor:pointer;
  transition:all .2s;background:var(--bg2);min-width:340px;
}
.drop-area:hover,.drop-area.drag{border-color:var(--accent);background:rgba(77,157,224,.05)}
.drop-area.disabled{opacity:.4;pointer-events:none}
.drop-ico{font-size:2rem;margin-bottom:.6rem;opacity:.7}
.drop-title{font-family:'Space Mono',monospace;font-size:.85rem;margin-bottom:.3rem}
.drop-sub{font-size:.78rem;color:var(--muted);margin-bottom:.85rem}

.btn{border:none;border-radius:var(--r);padding:.45rem 1.1rem;font-size:.8rem;
  font-weight:600;cursor:pointer;transition:all .15s;font-family:'IBM Plex Sans',sans-serif}
.btn-primary{background:var(--accent);color:#0a0e14}
.btn-primary:hover{opacity:.85}
.btn-secondary{background:var(--bg4);color:var(--text);border:1px solid var(--border2)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:.3rem .8rem;font-size:.75rem}
.btn:disabled{opacity:.35;cursor:default;pointer-events:none}

#dbCard{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:.9rem 1.2rem;display:flex;gap:1.75rem;flex-wrap:wrap;align-items:center;
  max-width:700px;
}
.db-stat{display:flex;flex-direction:column;gap:2px}
.db-stat-val{font-family:'Space Mono',monospace;font-size:1.15rem;font-weight:700;color:var(--accent)}
.db-stat-lbl{font-size:11px;color:var(--muted)}
.db-stat.base .db-stat-val{color:var(--accent2)}
.db-sep{width:1px;align-self:stretch;background:var(--border)}
.db-ver{font-family:'Space Mono',monospace;font-size:9px;color:var(--dim);
  padding:1px 5px;border:1px solid var(--border);border-radius:3px;white-space:nowrap}
#dbFileList{font-size:10px;color:var(--dim);line-height:1.5;max-width:260px;margin-left:auto}

.divider{border:none;border-top:1px solid var(--border);margin:1.4rem 0}

.toolbar{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:.7rem 1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;
}
.toolbar-sep{width:1px;height:20px;background:var(--border);margin:0 .2rem}
.search-inp{
  background:var(--bg3);border:1px solid var(--border2);border-radius:4px;
  color:var(--text);padding:.35rem .7rem;font-size:.8rem;width:190px;
  font-family:'IBM Plex Sans',sans-serif;
}
.search-inp:focus{outline:none;border-color:var(--accent)}
.sel{background:var(--bg3);border:1px solid var(--border2);border-radius:4px;
  color:var(--text);padding:.35rem .6rem;font-size:.8rem;cursor:pointer}
.row-count{font-size:11px;color:var(--dim);margin-left:auto;font-family:'Space Mono',monospace;white-space:nowrap}

.summary-bar{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:.7rem 1.1rem;margin-bottom:1rem;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;
}
.sum-stat{display:flex;flex-direction:column;gap:1px}
.sum-val{font-family:'Space Mono',monospace;font-size:1.05rem;font-weight:700;color:var(--text)}
.sum-val.ok{color:var(--accent2)}
.sum-val.warn{color:var(--accent3)}
.sum-val.err{color:var(--danger)}
.sum-val.dim{color:var(--dim)}
.sum-lbl{font-size:10px;color:var(--muted)}

.tbl-wrap{overflow:auto;border:1px solid var(--border);border-radius:var(--r);background:var(--bg2)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{position:sticky;top:0;z-index:2}
th{
  background:var(--bg3);border-bottom:1px solid var(--border2);
  padding:.5rem .7rem;text-align:left;white-space:nowrap;
  font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;
}
td{padding:.45rem .7rem;border-bottom:.5px solid var(--border);vertical-align:middle;white-space:nowrap}
tr:last-child td{border-bottom:none}
td.call{font-family:'Space Mono',monospace;font-weight:700;color:var(--call)}
td.base{font-family:'Space Mono',monospace;font-size:10px;color:var(--dim)}
td.loc {font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)}
td.num {font-family:'Space Mono',monospace;color:var(--dim);font-size:11px}
td.detail{white-space:normal;max-width:380px;font-size:11px;line-height:1.6;color:var(--muted)}
tr:hover td{background:rgba(77,157,224,.04)}

tr.sev-loc-high td{background:rgba(224,92,77,.11)}
tr.sev-loc-med  td{background:rgba(240,165,0,.09)}
tr.sev-call-d1  td{background:rgba(240,165,0,.07)}
tr.sev-call-d2  td{background:rgba(99,126,150,.07)}
tr.sev-unknown  td{background:rgba(99,126,150,.04)}
tr.sev-loccall  td{background:rgba(77,157,224,.07)}
tr.sev-loccall2 td{background:rgba(99,126,150,.05)}
tr.sev-loc-high:hover td,tr.sev-loc-med:hover td,
tr.sev-call-d1:hover td,tr.sev-call-d2:hover td,
tr.sev-unknown:hover td,tr.sev-loccall:hover td,tr.sev-loccall2:hover td{filter:brightness(1.12)}

.badge{display:inline-block;font-size:9px;padding:1px 5px;border-radius:2px;
  font-family:'Space Mono',monospace;vertical-align:middle;margin-right:2px}
.badge-ok   {background:rgba(46,204,138,.2);color:#3fb950}
.badge-loc-h{background:rgba(224,92,77,.25);color:var(--danger)}
.badge-loc-m{background:rgba(240,165,0,.25);color:var(--accent3)}
.badge-call {background:rgba(240,165,0,.22);color:var(--accent3)}
.badge-call2{background:rgba(99,126,150,.2);color:var(--muted)}
.badge-unk  {background:rgba(99,126,150,.15);color:var(--dim)}
.badge-loccall {background:rgba(77,157,224,.22);color:var(--accent)}
.badge-loccall2{background:rgba(99,126,150,.18);color:var(--muted)}

.chip{
  display:inline-block;font-family:'Space Mono',monospace;font-size:10px;
  padding:1px 6px;border-radius:3px;background:var(--bg4);border:1px solid var(--border2);
  margin:1px 2px 1px 0;color:var(--text);
}
.chip.d1{border-color:rgba(240,165,0,.6);color:var(--accent3)}
.chip .cnt{color:var(--dim);font-size:9px;margin-left:3px}
.chip-loc{
  display:inline-block;font-family:'Space Mono',monospace;font-size:10px;
  padding:1px 6px;border-radius:3px;background:var(--bg4);border:1px solid var(--border2);
  margin:1px 2px 1px 0;
}
.chip-loc.mode{border-color:rgba(224,92,77,.5);color:var(--danger)}
.chip-loc.seen{border-color:var(--border2);color:var(--muted)}
.chip-loc .cnt{color:var(--dim);font-size:9px;margin-left:3px}

#toast{
  position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;
  background:var(--bg3);border:1px solid var(--accent2);border-radius:var(--r);
  padding:.6rem 1rem;font-size:.8rem;color:var(--accent2);
  transform:translateY(100px);opacity:0;transition:all .3s;pointer-events:none;
  font-family:'Space Mono',monospace;
}
#toast.show{transform:translateY(0);opacity:1}
#toast.err{border-color:var(--danger);color:var(--danger)}
</style>
</head>
<body>

<header>
  <div class="logo">S56OA EDI<span class="icon">⟨×⟩</span>Crosscheck<span class="fmt"> tool</span></div>
  <span class="version">v1.6</span>
  <div class="lang-wrap">
    <button class="theme-btn" id="btnTheme" onclick="toggleTheme()">☀</button>
    <button class="lang-btn active" id="btnSL" onclick="setLang('sl')">SL</button>
    <button class="lang-btn"        id="btnEN" onclick="setLang('en')">EN</button>
  </div>
</header>

<main>

  <!-- ─── PANEL A: historical files ─── -->
  <div class="phase-panel" id="panelA">
    <div class="phase-hdr">
      <span class="phase-num active" id="numA">1/2</span>
      <span class="phase-title" data-i18n="stepTitle1">Naloži zgodovinske dnevnike</span>
    </div>
    <div class="drop-wrap">
      <div class="drop-area" id="histDrop">
        <div class="drop-ico">📂</div>
        <div class="drop-title" data-i18n="histDropTitle">Povleci EDI datoteke</div>
        <div class="drop-sub" data-i18n="histDropSub">zgodovinski dnevniki — 1 do 50+ datotek</div>
        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('histInput').click()" data-i18n="histBtn">Izberi datoteke</button>
      </div>
      <div id="dbCard" style="display:none">
        <div class="db-stat base" id="dbBaseStat" style="display:none">
          <span class="db-stat-val" id="dbBaseCalls">0</span>
          <span class="db-stat-lbl"><span data-i18n="dbBaseLbl">baseline znakov</span> <span class="db-ver" id="dbBaseVer"></span></span>
        </div>
        <div class="db-sep" id="dbBaseSep" style="display:none"></div>
        <div class="db-stat">
          <span class="db-stat-val" id="dbStatCalls">0</span>
          <span class="db-stat-lbl" data-i18n="dbLblCalls">klicnih znakov</span>
        </div>
        <div class="db-stat">
          <span class="db-stat-val" id="dbStatQso">0</span>
          <span class="db-stat-lbl">QSO</span>
        </div>
        <div class="db-stat">
          <span class="db-stat-val" id="dbStatFiles">0</span>
          <span class="db-stat-lbl" data-i18n="dbLblFiles">datotek</span>
        </div>
        <div class="db-stat">
          <span class="db-stat-val" id="dbStatLocs">0</span>
          <span class="db-stat-lbl" data-i18n="dbLblLocs">unik. lokatorjev</span>
        </div>
        <div id="dbFileList"></div>
      </div>
      <button class="btn btn-secondary btn-sm" id="btnClearHist" onclick="clearHist()" style="display:none" data-i18n="btnClearHist">↩ Počisti zgodovino</button>
    </div>
  </div>
  <input type="file" id="histInput" multiple accept=".edi,.EDI" style="display:none">

  <hr class="divider">

  <!-- ─── PANEL B: new log ─── -->
  <div class="phase-panel" id="panelB">
    <div class="phase-hdr">
      <span class="phase-num" id="numB">2/2</span>
      <span class="phase-title" data-i18n="stepTitle2">Naloži nov dnevnik za preverjanje</span>
    </div>
    <div class="drop-wrap">
      <div class="drop-area disabled" id="newDrop">
        <div class="drop-ico">📋</div>
        <div class="drop-title" data-i18n="newDropTitle">Povleci nov EDI dnevnik</div>
        <div class="drop-sub" data-i18n="newDropSub">en dnevnik za crosscheck</div>
        <button class="btn btn-primary btn-sm" id="btnChooseNew" onclick="document.getElementById('newInput').click()" data-i18n="newBtn" disabled>Izberi datoteko</button>
      </div>
    </div>
  </div>
  <input type="file" id="newInput" accept=".edi,.EDI" style="display:none">

  <hr class="divider" id="divResults" style="display:none">

  <!-- ─── PANEL C: results ─── -->
  <div id="panelC" style="display:none">
    <div class="summary-bar" id="summaryBar"></div>
    <div class="toolbar">
      <button class="btn btn-secondary btn-sm" onclick="document.getElementById('newInput').click()" data-i18n="btnNewLog">↩ Nov dnevnik</button>
      <div class="toolbar-sep"></div>
      <input class="search-inp" id="searchInp" placeholder="Išči klicni znak…" oninput="renderResults()">
      <select class="sel" id="filterSev" onchange="renderResults()">
        <option value=""        data-i18n="fAll">— vse —</option>
        <option value="flagged" data-i18n="fFlagged">Samo označene</option>
        <option value="clean"   data-i18n="fClean">Samo čiste</option>
      </select>
      <div class="toolbar-sep"></div>
      <label style="font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px;white-space:nowrap">
        <span data-i18n="lblMinApp">Min. pojavitev:</span> <span id="valMinApp">3</span>
        <input type="range" id="rngMinApp" min="1" max="10" value="3" style="width:60px;cursor:pointer" onchange="updatePrag()">
      </label>
      <label style="font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px;white-space:nowrap">
        <span data-i18n="lblConf">Confidence:</span> <span id="valConf">60</span>%
        <input type="range" id="rngConf" min="10" max="100" value="60" style="width:60px;cursor:pointer" onchange="updatePrag()">
      </label>
      <button class="btn btn-secondary btn-sm" id="btnRerun" onclick="rerunCrosscheck()" style="display:none">⟳ Ponovi</button>
      <button class="btn btn-secondary btn-sm" id="btnExport" onclick="exportIssues()" style="display:none" data-i18n="btnExport">⬇ Izvoz problemov</button>
      <div class="row-count" id="rowCount"></div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead id="tHead"></thead>
        <tbody id="tBody"></tbody>
      </table>
    </div>
  </div>

</main>

<div id="toast" aria-live="polite"></div>

<script>
// ════════════════════════════════════════
//  I18N
// ════════════════════════════════════════
const S = {
sl:{
  stepTitle1:'Naloži zgodovinske dnevnike',
  stepTitle2:'Naloži nov dnevnik za preverjanje',
  histDropTitle:'Povleci EDI datoteke',
  histDropSub:'zgodovinski dnevniki — 1 do 50+ datotek',
  histBtn:'Izberi datoteke',
  newDropTitle:'Povleci nov EDI dnevnik',
  newDropSub:'en dnevnik za crosscheck',
  newBtn:'Izberi datoteko',
  dbLblCalls:'klicnih znakov', dbLblFiles:'datotek', dbLblLocs:'unik. lokatorjev',
  dbBaseLbl:'baseline znakov',
  btnClearHist:'↩ Počisti zgodovino',
  btnNewLog:'↩ Nov dnevnik',
  fAll:'— vse —', fFlagged:'Samo označene', fClean:'Samo čiste',
  thNum:'#', thStatus:'Status', thCall:'Klicni znak', thBase:'Norm.',
  thLoc:'Lokator', thBand:'Pas', thMode:'Način', thDate:'Datum', thDetail:'Ugotovitve',
  sumTotal:'skupaj QSO', sumClean:'čistih', sumFlagged:'označenih',
  sumLocH:'LOC! (visoka)', sumLocM:'LOC? (srednja)', sumCall:'CALL?', sumCallLoc:'CALL? lok.', sumUnk:'neznani',
  clean:'Čisto — v zgodovinski bazi',
  histMode:'Hist. mod:',
  similar:'Podoben:',
  fromLocator:'Iz lokatorja:',
  noSimilar:'Ni podobnih v zgodovini',
  errEdi:'Napaka pri branju EDI',
  exportTitle:'EDI Crosscheck — Problematične zveze',
  exportMeta:'${flagged} od ${total} QSO (${pct}%) | Min. pojavitev: ${minApp} | Confidence: ${conf}%',
  exportCols:['#','Klicni znak','Pas','Način','Datum','Predlogi popravkov'],
  srchPlaceholder:'Išči klicni znak…',
  btnExport:'⬇ Izvoz problemov',
  rerunToast:'Crosscheck ponovljen z novimi pragovi',
  lblMinApp:'Min. pojavitev:',
  lblConf:'Confidence:',
  expNoIssues:'Ni problematičnih zvez za izvoz',
  expToast:'Izvoz: ${n} problematičnih zvez',
  expLocPrefix:'Lokator:',
  expSuggest:'→ predlagaj',
  expMissingLoc:'Manjkajoč lokator',
  expSimilarCall:'Podoben klicni znak:',
  expCallByLoc:'Klicni znak iz lokatorja:',
  expUnknownCall:'Neznan klicni znak — ni podobnih v zgodovini',
},
en:{
  stepTitle1:'Load historical logs',
  stepTitle2:'Load new log to crosscheck',
  histDropTitle:'Drag EDI files here',
  histDropSub:'historical logs — 1 to 50+ files',
  histBtn:'Choose files',
  newDropTitle:'Drag new EDI log here',
  newDropSub:'one log for crosschecking',
  newBtn:'Choose file',
  dbLblCalls:'callsigns', dbLblFiles:'files', dbLblLocs:'unique locators',
  dbBaseLbl:'baseline calls',
  btnClearHist:'↩ Clear history',
  btnNewLog:'↩ New log',
  fAll:'— all —', fFlagged:'Flagged only', fClean:'Clean only',
  thNum:'#', thStatus:'Status', thCall:'Callsign', thBase:'Norm.',
  thLoc:'Locator', thBand:'Band', thMode:'Mode', thDate:'Date', thDetail:'Findings',
  sumTotal:'total QSOs', sumClean:'clean', sumFlagged:'flagged',
  sumLocH:'LOC! (high)', sumLocM:'LOC? (med)', sumCall:'CALL?', sumCallLoc:'CALL? loc.', sumUnk:'unknown',
  clean:'Clean — found in history',
  histMode:'Hist. mode:',
  similar:'Similar:',
  fromLocator:'From locator:',
  noSimilar:'No similar found in history',
  errEdi:'EDI read error',
  exportTitle:'EDI Crosscheck — Flagged QSOs',
  exportMeta:'${flagged} of ${total} QSOs (${pct}%) | Min. appearances: ${minApp} | Confidence: ${conf}%',
  exportCols:['#','Callsign','Band','Mode','Date','Correction suggestions'],
  srchPlaceholder:'Search callsign…',
  btnExport:'⬇ Export issues',
  rerunToast:'Crosscheck re-run with new thresholds',
  lblMinApp:'Min. appearances:',
  lblConf:'Confidence:',
  expNoIssues:'No flagged QSOs to export',
  expToast:'Exported: ${n} flagged QSOs',
  expLocPrefix:'Locator:',
  expSuggest:'→ suggest',
  expMissingLoc:'Missing locator',
  expSimilarCall:'Similar callsign:',
  expCallByLoc:'Callsign from locator:',
  expUnknownCall:'Unknown callsign — no similar found in history',
}};
let _lang = 'sl';
function t(k){ return (S[_lang]||S.sl)[k] || (S.sl[k]||k); }
function setLang(l){
  _lang = l;
  document.getElementById('btnSL').classList.toggle('active', l==='sl');
  document.getElementById('btnEN').classList.toggle('active', l==='en');
  document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.dataset.i18n));
  document.getElementById('searchInp').placeholder = t('srchPlaceholder');
  // Update slider value labels to match current language
  updatePrag();
  renderSummaryBar();
  renderResults();
}

// ════════════════════════════════════════
//  BAND MAPPING
// ════════════════════════════════════════
const BAND_MAP = [
  [/50\s*MHz|^6m$/i,                                    '6m'    ],
  [/144|145|^2m$/i,                                     '2m'    ],
  [/432|430|^70\s*cm$/i,                                '70cm'  ],
  [/1[,.]2[0-9]*\s*GHz|1[,.]3[0-9]*\s*GHz|1296|^23\s*cm$/i, '23cm'],
  [/2[,.]3[0-9]*\s*GHz|2320|^13\s*cm$/i,               '13cm'  ],
  [/3[,.]4[0-9]*\s*GHz|3400|^9\s*cm$/i,                '9cm'   ],
  [/5[,.]7[0-9]*\s*GHz|5760|^6\s*cm$/i,                '6cm'   ],
  [/^10\s*GHz$|10[,.]3[0-9]*\s*GHz|10368|^3\s*cm$/i,  '3cm'   ],
  [/24([,.]0[0-9]*)?\s*GHz|24048|1[,.]25?\s*cm/i,      '1.25cm'],
  [/47\s*GHz/i,                                         '6mm'   ],
];
function normBand(s){
  if(!s) return '';
  for(const [re, band] of BAND_MAP) if(re.test(s.trim())) return band;
  return s.trim();
}

// ════════════════════════════════════════
//  EDI PARSER
// ════════════════════════════════════════
function parseEDI(text, filename){
  const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  const h = {}, qsos = [];
  let section = '';
  for(const raw of lines){
    const line = raw.trim();
    if(!line) continue;
    if(line.startsWith('[')){ section = line.toLowerCase(); continue; }
    if(section.startsWith('[qsorecords')){
      const p = line.split(';');
      if(p.length < 10) continue;
      const call = (p[2]||'').trim().toUpperCase();
      if(!call || call === 'ERROR') continue;
      const modeNum = parseInt(p[3]) || 1;
      const wwlRaw = (p[9]||'').trim().toUpperCase();
      const wwl = wwlRaw.length===6 ? wwlRaw.slice(0,4)+wwlRaw.slice(4).toLowerCase() : wwlRaw;
      const locValid = /^[A-R]{2}[0-9]{2}[A-X]{2}$/i.test(wwl);
      const dateRaw = p[0].trim();
      const yy = parseInt(dateRaw.substring(0,2));
      const mm = dateRaw.substring(2,4);
      const dd = dateRaw.substring(4,6);
      const yyyy = yy>=90 ? 1900+yy : 2000+yy;
      const mode = ['','SSB','CW','CW','SSB','AM','FM','RTTY','SSTV','ATV'][modeNum]||'SSB';
      qsos.push({
        call, mode,
        wwl: locValid ? wwl : '',
        dateDisp: `${dd}.${mm}.${yyyy}`,
        src: filename,
        band: '',
      });
    } else {
      const eq = line.indexOf('=');
      if(eq > 0) h[line.substring(0,eq).toLowerCase()] = line.substring(eq+1).trim();
    }
  }
  const band = normBand(h['pband']||'');
  qsos.forEach(q => { if(!q.band) q.band = band; });
  return { header: h, band, qsos };
}

// ════════════════════════════════════════
//  UTILITIES
// ════════════════════════════════════════
function baseCall(call){
  const upper = call.toUpperCase();
  const i = upper.lastIndexOf('/');
  if(i <= 0) return upper;
  // If the part before the slash contains a digit, it's a callsign+suffix pattern → strip suffix
  if(/\d/.test(upper.slice(0, i))) return upper.slice(0, i);
  // Otherwise it's a prefix+call pattern (e.g. OE/S59DGO, F/ON4AAA) → keep as-is
  return upper;
}

function levenshtein(a, b, maxDist){
  const na = a.length, nb = b.length;
  if(Math.abs(na-nb) > maxDist) return maxDist+1;
  let prev = Array.from({length:nb+1}, (_,i)=>i);
  for(let i=1; i<=na; i++){
    const curr = [i];
    let rowMin = i;
    for(let j=1; j<=nb; j++){
      const v = Math.min(prev[j]+1, curr[j-1]+1, prev[j-1]+(a[i-1]===b[j-1]?0:1));
      curr.push(v);
      if(v < rowMin) rowMin = v;
    }
    if(rowMin > maxDist) return maxDist+1;
    prev = curr;
  }
  return prev[nb];
}

function htmlEsc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ════════════════════════════════════════
//  HISTORICAL DB
//  Map<baseCall, {
//    locators:    Map<locUPPER, count>,  // weighted (algorithmic decisions)
//    locatorsRaw: Map<locUPPER, count>,  // raw counts (UI display)
//    total:       int,                    // weighted sum
//    totalRaw:    int,                    // raw sum
//  }>
//  Weighting: EDI QSO = 1, baseline entry = BASELINE_WEIGHT (3).
//  All algorithmic decisions (threshold, mode locator, confidence ratio)
//  use weighted counts. All numbers shown to the user (chips, exports)
//  come from raw counts to remain intuitive.
// ════════════════════════════════════════
const _histDB = new Map();
const _locToCalls    = new Map(); // Map<locatorUpper → Map<baseCall, weighted>>
const _locToCallsRaw = new Map(); // Map<locatorUpper → Map<baseCall, raw>>
let _histFiles = [];   // [{name, size}]
let _histQsoCount = 0;
let _lastQsos = [];    // last new-log QSOs for re-run
let _minAppearances = 3;
let _minConfidence  = 0.6;

// Baseline: prebuilt OEVSV IARU R1 contest stats (call → loc → count*weight)
// Each baseline entry weighs BASELINE_WEIGHT × an EDI QSO (authoritative
// own-locator declaration vs. partner-reported locator).
const BASELINE_WEIGHT = 3;
let _baselineRaw = null;     // parsed JSON, kept for re-injection after clearHist
let _baselineCalls = 0;      // # of calls contributed by baseline
let _baselineVer   = '';     // version tag, e.g. "2026-05-13"

function addToHistDB(qsos){
  for(const q of qsos){
    const base = baseCall(q.call);
    if(!_histDB.has(base)) _histDB.set(base, { locators: new Map(), locatorsRaw: new Map(), total: 0, totalRaw: 0 });
    const entry = _histDB.get(base);
    entry.total++;
    entry.totalRaw++;
    if(q.wwl){
      const loc = q.wwl.toUpperCase();
      entry.locators.set(loc, (entry.locators.get(loc)||0)+1);
      entry.locatorsRaw.set(loc, (entry.locatorsRaw.get(loc)||0)+1);
      if(!_locToCalls.has(loc))    _locToCalls.set(loc, new Map());
      if(!_locToCallsRaw.has(loc)) _locToCallsRaw.set(loc, new Map());
      _locToCalls.get(loc)   .set(base, (_locToCalls.get(loc)   .get(base)||0)+1);
      _locToCallsRaw.get(loc).set(base, (_locToCallsRaw.get(loc).get(base)||0)+1);
    }
  }
}

// Inject pre-built baseline (OEVSV CSV-derived call→band→locator stats) into
// _histDB. Bands are aggregated to flat locator counts to fit the current
// algorithm's data shape; per-band data remains in _baselineRaw for future use.
// Weight applied: BASELINE_WEIGHT × the count from baseline.
function applyBaseline(json){
  if(!json || !json.c) return;
  const calls = json.c;
  let cCount = 0;
  for(const call of Object.keys(calls)){
    cCount++;
    const byBandIdx = calls[call];
    if(!_histDB.has(call)) _histDB.set(call, { locators: new Map(), locatorsRaw: new Map(), total: 0, totalRaw: 0 });
    const entry = _histDB.get(call);
    for(const idxStr of Object.keys(byBandIdx)){
      for(const locInfo of byBandIdx[idxStr]){
        const loc   = locInfo[0];
        const count = locInfo[1];
        const w     = count * BASELINE_WEIGHT;
        const locUp = loc.toUpperCase();
        entry.total    += w;
        entry.totalRaw += count;
        entry.locators   .set(locUp, (entry.locators   .get(locUp)||0) + w);
        entry.locatorsRaw.set(locUp, (entry.locatorsRaw.get(locUp)||0) + count);
        if(!_locToCalls.has(locUp))    _locToCalls.set(locUp, new Map());
        if(!_locToCallsRaw.has(locUp)) _locToCallsRaw.set(locUp, new Map());
        _locToCalls.get(locUp)   .set(call, (_locToCalls.get(locUp)   .get(call)||0) + w);
        _locToCallsRaw.get(locUp).set(call, (_locToCallsRaw.get(locUp).get(call)||0) + count);
      }
    }
  }
  _baselineCalls = cCount;
  _baselineVer   = json.v || '';
}

async function loadBaseline(){
  try {
    const r = await fetch('./crosscheck-baseline.json');
    if(!r.ok) return;
    const j = await r.json();
    _baselineRaw = j;
    applyBaseline(j);
    updateDbCard();
  } catch(e) {
    // Silent fallback: file:// CORS, missing file, or parse error.
    // Tool keeps working with user-supplied EDI history only.
  }
}

function clearHist(){
  _histDB.clear();
  _locToCalls.clear();
  _locToCallsRaw.clear();
  _histFiles = [];
  _histQsoCount = 0;
  _results = [];
  // Baseline is persistent — re-inject after clear.
  if(_baselineRaw) applyBaseline(_baselineRaw);
  document.getElementById('divResults').style.display = 'none';
  document.getElementById('panelC').style.display = 'none';
  if(_baselineRaw){
    // Baseline alone enables phase 2; show card with baseline stats only.
    updateDbCard();
  } else {
    document.getElementById('dbCard').style.display = 'none';
    document.getElementById('btnClearHist').style.display = 'none';
    document.getElementById('numA').className = 'phase-num active';
    document.getElementById('numB').className = 'phase-num';
    setNewDropEnabled(false);
  }
}

function updateDbCard(){
  const hasBaseline = _baselineCalls > 0;
  const hasEdi     = _histFiles.length > 0;
  if(!hasBaseline && !hasEdi){
    document.getElementById('dbCard').style.display = 'none';
    return;
  }
  document.getElementById('dbCard').style.display = 'flex';
  document.getElementById('btnClearHist').style.display = hasEdi ? 'inline-block' : 'none';

  // Baseline tag (shown only if loaded)
  document.getElementById('dbBaseStat').style.display = hasBaseline ? 'flex' : 'none';
  document.getElementById('dbBaseSep').style.display  = hasBaseline ? 'block' : 'none';
  if(hasBaseline){
    document.getElementById('dbBaseCalls').textContent = _baselineCalls;
    document.getElementById('dbBaseVer').textContent   = _baselineVer ? 'v'+_baselineVer : '';
  }

  // Combined stats — these reflect the full DB used for crosscheck.
  const totalLocs = new Set();
  for(const e of _histDB.values()) for(const l of e.locators.keys()) totalLocs.add(l);
  document.getElementById('dbStatCalls').textContent = _histDB.size;
  document.getElementById('dbStatQso').textContent = _histQsoCount;
  document.getElementById('dbStatFiles').textContent = _histFiles.length;
  document.getElementById('dbStatLocs').textContent = totalLocs.size;

  const names = _histFiles.map(f => f.name);
  const shown = names.slice(0,6).join(', ');
  document.getElementById('dbFileList').textContent =
    names.length > 6 ? shown + ` … +${names.length-6}` : shown;
  document.getElementById('numA').className = 'phase-num done';
  setNewDropEnabled(true);
}

// ════════════════════════════════════════
//  CROSSCHECK ALGORITHM
// ════════════════════════════════════════
function getModeLocator(entry){
  if(!entry.locators.size) return null;
  const sorted = [...entry.locators.entries()].sort((a,b) => b[1]-a[1] || a[0].localeCompare(b[0]));
  return { loc: sorted[0][0], count: sorted[0][1] };
}

function findSimilar(base, histCalls, distCache){
  const similar = [];
  for(const hcall of histCalls){
    const cacheKey = base + '\n' + hcall;
    let d = distCache ? distCache.get(cacheKey) : undefined;
    if(d === undefined){
      d = levenshtein(base, hcall, 2);
      if(distCache) distCache.set(cacheKey, d);
    }
    if(d > 0 && d <= 2){
      const e = _histDB.get(hcall);
      // Display: raw count; falls back to weighted total if raw not tracked
      // (defensive for old-shape entries during partial migrations).
      const count = e.totalRaw != null ? e.totalRaw : e.total;
      similar.push({ call: hcall, dist: d, count });
    }
  }
  similar.sort((a,b) => a.dist-b.dist || b.count-a.count);
  return similar.slice(0, 5);
}

let _results = [];

function runCrosscheck(qsos){
  const histCalls = [..._histDB.keys()];

  // Pre-compute similar calls for each unique unknown base call
  const similarCache = new Map();
  // Levenshtein distance cache to avoid recomputing the same pair
  const distCache = new Map();
  const seenBases = new Set(qsos.map(q => baseCall(q.call)));
  for(const base of seenBases){
    if(!_histDB.has(base)) similarCache.set(base, findSimilar(base, histCalls, distCache));
  }

  _results = qsos.map((qso, idx) => {
    const base = baseCall(qso.call);
    const histEntry = _histDB.get(base);
    const issues = [];

    // Locator check
    // Decisions use weighted counts (entry.total / entry.locators);
    // display fields (historicalModeCount, total, allLocs, newLocCount)
    // use raw counts so chips remain intuitive.
    if(histEntry && histEntry.total >= _minAppearances && histEntry.locators.size > 0){
      const modeLoc = getModeLocator(histEntry);
      if(modeLoc){
        const modeConf       = modeLoc.count / histEntry.total;             // ratio invariant under uniform weighting
        const modeRawCount   = histEntry.locatorsRaw.get(modeLoc.loc) || 0; // for display
        const totalRaw       = histEntry.totalRaw;
        const allLocsRaw     = [...histEntry.locatorsRaw.entries()].sort((a,b) => b[1]-a[1]);
        if(qso.wwl){
          const newLocUp = qso.wwl.toUpperCase();
          if(modeLoc.loc !== newLocUp){
            const newLocWeighted = histEntry.locators.get(newLocUp) || 0;
            const newLocRaw      = histEntry.locatorsRaw.get(newLocUp) || 0;
            issues.push({
              type: 'LOC_MISMATCH',
              historicalMode: modeLoc.loc,
              historicalModeCount: modeRawCount,
              newLocCount: newLocRaw,
              total: totalRaw,
              allLocs: allLocsRaw,
              severity: (modeConf >= _minConfidence && newLocWeighted === 0) ? 'high' : 'med',
            });
          }
        } else {
          // Missing locator in new log — suggest historical mode
          issues.push({
            type: 'LOC_MISSING',
            historicalMode: modeLoc.loc,
            historicalModeCount: modeRawCount,
            total: totalRaw,
            allLocs: allLocsRaw,
            severity: modeConf >= _minConfidence ? 'high' : 'med',
          });
        }
      }
    }

    // Callsign check: only if not in history at all
    if(!histEntry){
      const globalSimilar = similarCache.get(base) || [];
      issues.push(globalSimilar.length > 0
        ? { type: 'CALL_SIMILAR', similar: globalSimilar }
        : { type: 'CALL_UNKNOWN' }
      );

      // Locator-filtered callsign suggestion (composite heuristic).
      // Algorithm iterates over weighted _locToCalls (presence is the signal,
      // not weight), but the display count uses _locToCallsRaw.
      if(qso.wwl){
        const locUp    = qso.wwl.toUpperCase();
        const locCalls = _locToCalls.get(locUp);
        const locCallsRaw = _locToCallsRaw.get(locUp);
        if(locCalls && locCalls.size > 0){
          const candidates = [];
          for(const [hcall] of locCalls){
            const cacheKey = base + '\n' + hcall;
            let d = distCache.get(cacheKey);
            if(d === undefined){
              d = levenshtein(base, hcall, 2);
              distCache.set(cacheKey, d);
            }
            if(d > 0 && d <= 2){
              const rawCount = (locCallsRaw && locCallsRaw.get(hcall)) || 0;
              candidates.push({ call: hcall, dist: d, count: rawCount });
            }
          }
          if(candidates.length > 0){
            candidates.sort((a,b) => a.dist-b.dist || b.count-a.count);
            issues.push({ type: 'CALL_BY_LOC', similar: candidates.slice(0,5) });
          }
        }
      }
    }

    return { qso, issues, base, idx: idx+1 };
  });
  return _results;
}

// ════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════
function renderSummaryBar(){
  if(!_results.length){ document.getElementById('summaryBar').innerHTML=''; return; }
  let nClean=0, nLocH=0, nLocM=0, nLocMiss=0, nCall=0, nCallLoc=0, nUnk=0;
  for(const r of _results){
    if(!r.issues.length){ nClean++; continue; }
    for(const iss of r.issues){
      if(iss.type==='LOC_MISMATCH')  iss.severity==='high' ? nLocH++ : nLocM++;
      else if(iss.type==='LOC_MISSING') nLocMiss++;
      else if(iss.type==='CALL_SIMILAR') nCall++;
      else if(iss.type==='CALL_BY_LOC') nCallLoc++;
      else nUnk++;
    }
  }
  const nFlagged = _results.length - nClean;
  const stat = (val, cls, lbl) =>
    `<div class="sum-stat"><span class="sum-val ${cls}">${val}</span><span class="sum-lbl">${htmlEsc(lbl)}</span></div>`;

  document.getElementById('summaryBar').innerHTML =
    stat(_results.length, '', t('sumTotal')) +
    stat(nClean,   'ok',   t('sumClean')) +
    stat(nFlagged, nFlagged?'warn':'ok', t('sumFlagged')) +
    (nLocH ? stat(nLocH, 'err',  t('sumLocH')) : '') +
    (nLocM ? stat(nLocM, 'warn', t('sumLocM')) : '') +
    (nLocMiss ? stat(nLocMiss, 'warn', t('sumLocM')) : '') +
    (nCall ? stat(nCall, 'warn', t('sumCall'))  : '') +
    (nCallLoc ? stat(nCallLoc, 'warn', t('sumCallLoc')) : '') +
    (nUnk  ? stat(nUnk,  'dim',  t('sumUnk'))   : '');
}

function rowSevClass(issues){
  if(!issues.length) return '';
  for(const iss of issues)
    if(iss.type==='LOC_MISMATCH' && iss.severity==='high') return 'sev-loc-high';
  for(const iss of issues){
    if(iss.type==='LOC_MISMATCH') return 'sev-loc-med';
    if(iss.type==='LOC_MISSING') return 'sev-loc-med';
    if(iss.type==='CALL_SIMILAR' && iss.similar[0]?.dist===1) return 'sev-call-d1';
    if(iss.type==='CALL_SIMILAR') return 'sev-call-d2';
    if(iss.type==='CALL_BY_LOC'  && iss.similar[0]?.dist===1) return 'sev-loccall';
    if(iss.type==='CALL_BY_LOC') return 'sev-loccall2';
    if(iss.type==='CALL_UNKNOWN') return 'sev-unknown';
  }
  return '';
}

function renderBadges(issues){
  if(!issues.length) return `<span class="badge badge-ok">✓</span>`;
  return issues.map(iss => {
    if(iss.type==='LOC_MISMATCH')
      return `<span class="badge ${iss.severity==='high'?'badge-loc-h':'badge-loc-m'}">LOC?</span>`;
    if(iss.type==='LOC_MISSING')
      return `<span class="badge badge-loc-m">LOC?</span>`;
    if(iss.type==='CALL_SIMILAR'){
      const minD = iss.similar[0]?.dist || 2;
      return `<span class="badge ${minD===1?'badge-call':'badge-call2'}">CALL?</span>`;
    }
    if(iss.type==='CALL_BY_LOC'){
      const minD = iss.similar[0]?.dist || 2;
      return `<span class="badge ${minD===1?'badge-loccall':'badge-loccall2'}">LOC-CALL?</span>`;
    }
    return `<span class="badge badge-unk">?</span>`;
  }).join('');
}

function renderDetail(issues){
  if(!issues.length) return `<span style="color:var(--dim);font-size:10px">${htmlEsc(t('clean'))}</span>`;
  return issues.map(iss => {
    if(iss.type === 'LOC_MISMATCH'){
      const chips = iss.allLocs.slice(0,5).map(([loc,cnt]) => {
        const isCurrent = loc === iss.historicalMode;
        return `<span class="chip-loc ${isCurrent?'mode':'seen'}">${htmlEsc(loc)}<span class="cnt">${cnt}×</span></span>`;
      }).join('');
      return `<span style="color:var(--muted)">${htmlEsc(t('histMode'))}</span> ${chips}`;
    }
    if(iss.type === 'CALL_SIMILAR'){
      const chips = iss.similar.map(s =>
        `<span class="chip ${s.dist===1?'d1':''}">${htmlEsc(s.call)}<span class="cnt">d=${s.dist} · ${s.count}×</span></span>`
      ).join('');
      return `<span style="color:var(--muted)">${htmlEsc(t('similar'))}</span> ${chips}`;
    }
    if(iss.type === 'CALL_BY_LOC'){
      const chips = iss.similar.map(s =>
        `<span class="chip ${s.dist===1?'d1':''}">${htmlEsc(s.call)}<span class="cnt">d=${s.dist} · ${s.count}×</span></span>`
      ).join('');
      return `<span style="color:var(--muted)">${htmlEsc(t('fromLocator'))}</span> ${chips}`;
    }
    return `<span style="color:var(--dim);font-size:10px">${htmlEsc(t('noSimilar'))}</span>`;
  }).join('<br>');
}

function renderResults(){
  const search = (document.getElementById('searchInp').value||'').trim().toUpperCase();
  const sevFilter = document.getElementById('filterSev').value;
  const hasNorm = _results.some(r => r.base !== r.qso.call);

  document.getElementById('tHead').innerHTML = `<tr>
    <th>${htmlEsc(t('thNum'))}</th>
    <th>${htmlEsc(t('thStatus'))}</th>
    <th>${htmlEsc(t('thCall'))}</th>
    ${hasNorm ? `<th>${htmlEsc(t('thBase'))}</th>` : ''}
    <th>${htmlEsc(t('thLoc'))}</th>
    <th>${htmlEsc(t('thBand'))}</th>
    <th>${htmlEsc(t('thMode'))}</th>
    <th>${htmlEsc(t('thDate'))}</th>
    <th>${htmlEsc(t('thDetail'))}</th>
  </tr>`;

  const rows = _results.filter(r => {
    const flagged = r.issues.length > 0;
    if(sevFilter==='flagged' && !flagged) return false;
    if(sevFilter==='clean'   &&  flagged) return false;
    if(search && !r.qso.call.includes(search) && !r.base.includes(search)) return false;
    return true;
  });

  document.getElementById('tBody').innerHTML = rows.map(r => {
    const q = r.qso;
    const cls = rowSevClass(r.issues);
    return `<tr class="${cls}">
      <td class="num">${r.idx}</td>
      <td>${renderBadges(r.issues)}</td>
      <td class="call">${htmlEsc(q.call)}</td>
      ${hasNorm ? `<td class="base">${r.base !== q.call ? htmlEsc(r.base) : ''}</td>` : ''}
      <td class="loc">${htmlEsc(q.wwl||'—')}</td>
      <td style="font-size:11px">${htmlEsc(q.band||'')}</td>
      <td style="font-size:11px">${htmlEsc(q.mode||'')}</td>
      <td style="font-size:11px;color:var(--muted)">${htmlEsc(q.dateDisp||'')}</td>
      <td class="detail">${renderDetail(r.issues)}</td>
    </tr>`;
  }).join('');

  document.getElementById('rowCount').textContent =
    `${rows.length} / ${_results.length} QSO`;
}

function showResults(){
  document.getElementById('divResults').style.display = 'block';
  document.getElementById('panelC').style.display = 'block';
  document.getElementById('numB').className = 'phase-num done';
  document.getElementById('btnExport').style.display = 'inline-block';
  renderSummaryBar();
  renderResults();
  document.getElementById('panelC').scrollIntoView({ behavior:'smooth', block:'start' });
}

function exportIssues(){
  const flagged = _results.filter(r => r.issues.length > 0);
  if(!flagged.length){ showToast(t('expNoIssues')); return; }

  const rows = flagged.map(r => {
    const q = r.qso;
    const issues = r.issues.map(iss => {
      if(iss.type === 'LOC_MISMATCH'){
        return `${t('expLocPrefix')} <b>${htmlEsc(q.wwl||'—')}</b> ${t('expSuggest')} <b>${htmlEsc(iss.historicalMode)}</b> (mode ${iss.historicalModeCount}/${iss.total} = ${Math.round(iss.historicalModeCount/iss.total*100)}%)`;
      }
      if(iss.type === 'LOC_MISSING'){
        return `${t('expMissingLoc')} ${t('expSuggest')} <b>${htmlEsc(iss.historicalMode)}</b> (mode ${iss.historicalModeCount}/${iss.total} = ${Math.round(iss.historicalModeCount/iss.total*100)}%)`;
      }
      if(iss.type === 'CALL_SIMILAR'){
        const sug = iss.similar.slice(0,3).map(s => `${htmlEsc(s.call)} (d=${s.dist})`).join(', ');
        return `${t('expSimilarCall')} ${sug}`;
      }
      if(iss.type === 'CALL_BY_LOC'){
        const sug = iss.similar.slice(0,3).map(s => `${htmlEsc(s.call)} (d=${s.dist})`).join(', ');
        return `${t('expCallByLoc')} ${sug}`;
      }
      return t('expUnknownCall');
    }).join('<br>');

    return `<tr>
      <td>${r.idx}</td>
      <td><b>${htmlEsc(q.call)}</b></td>
      <td>${htmlEsc(q.band||'')}</td>
      <td>${htmlEsc(q.mode||'')}</td>
      <td>${htmlEsc(q.dateDisp||'')}</td>
      <td>${issues}</td>
    </tr>`;
  }).join('');

  const cols = t('exportCols');
  const meta = t('exportMeta')
    .replaceAll('${flagged}', flagged.length)
    .replaceAll('${total}', _results.length)
    .replaceAll('${pct}', Math.round(flagged.length/_results.length*100))
    .replaceAll('${minApp}', _minAppearances)
    .replaceAll('${conf}', Math.round(_minConfidence*100));
  const html = `<!DOCTYPE html>
<html lang="${_lang}">
<head><meta charset="UTF-8"><title>${htmlEsc(t('exportTitle'))}</title>
<style>
body{font-family:'IBM Plex Sans',sans-serif;font-size:14px;color:#18273a;background:#f0f4f8;padding:2rem}
h1{font-size:1.4rem;margin-bottom:.5rem}
h2{font-size:1rem;color:#4a6275;margin-bottom:1.5rem;font-weight:400}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:6px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08)}
th{background:#e4ecf3;padding:.6rem .8rem;text-align:left;font-size:11px;text-transform:uppercase;color:#4a6275;font-weight:600}
td{padding:.5rem .8rem;border-bottom:1px solid #e4ecf3;vertical-align:top}
tr:hover td{background:#f8fafc}
b{color:#c03030}
</style></head>
<body>
<h1>${htmlEsc(t('exportTitle'))}</h1>
<h2>${htmlEsc(meta)}</h2>
<table>
  <thead><tr>${cols.map(c => '<th>' + htmlEsc(c) + '</th>').join('')}</tr></thead>
  <tbody>${rows}</tbody>
</table>
</body></html>`;

  const blob = new Blob([html], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'crosscheck-issues.html';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 0);
  showToast(t('expToast').replaceAll('${n}', flagged.length));
}

// ════════════════════════════════════════
//  FILE LOADING
// ════════════════════════════════════════
function loadHistFiles(files){
  let done = 0;
  const arr = Array.from(files);
  if(!arr.length) return;

  arr.forEach(f => {
    // Skip duplicates by name+size
    if(_histFiles.some(hf => hf.name===f.name && hf.size===f.size)){
      done++;
      if(done===arr.length) updateDbCard();
      return;
    }
    const r = new FileReader();
    r.onload = e => {
      try {
        const { qsos } = parseEDI(e.target.result, f.name);
        addToHistDB(qsos);
        _histQsoCount += qsos.length;
        _histFiles.push({ name: f.name, size: f.size });
      } catch(err) {
        showToast(t('errEdi') + ': ' + f.name, true);
      }
      done++;
      if(done === arr.length) updateDbCard();
    };
    r.onerror = () => {
      showToast(t('errEdi') + ': ' + f.name, true);
      done++;
      if(done === arr.length) updateDbCard();
    };
    r.readAsText(f, 'utf-8');
  });
}

function loadNewFile(file){
  _results = []; // clear previous results while loading
  const r = new FileReader();
  r.onload = e => {
    try {
      const { qsos } = parseEDI(e.target.result, file.name);
      _lastQsos = qsos;
      runCrosscheck(qsos);
      showResults();
    } catch(err) {
      showToast(t('errEdi') + ': ' + file.name, true);
    }
  };
  r.readAsText(file, 'utf-8');
}

function updatePrag(){
  _minAppearances = parseInt(document.getElementById('rngMinApp').value, 10);
  _minConfidence  = parseInt(document.getElementById('rngConf').value, 10) / 100;
  document.getElementById('valMinApp').textContent = _minAppearances;
  document.getElementById('valConf').textContent = Math.round(_minConfidence * 100);
  if(_lastQsos.length){
    document.getElementById('btnRerun').style.display = 'inline-block';
  }
}

function rerunCrosscheck(){
  if(!_lastQsos.length) return;
  runCrosscheck(_lastQsos);
  renderSummaryBar();
  renderResults();
  showToast(t('rerunToast'));
}

function setNewDropEnabled(enabled){
  const drop = document.getElementById('newDrop');
  const btn  = document.getElementById('btnChooseNew');
  drop.classList.toggle('disabled', !enabled);
  btn.disabled = !enabled;
  document.getElementById('numB').className = 'phase-num' + (enabled ? ' active' : '');
}

// ════════════════════════════════════════
//  DRAG & DROP + INPUT WIRING
// ════════════════════════════════════════
function setupDrop(el, onFiles){
  el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag'); });
  el.addEventListener('dragleave', () => el.classList.remove('drag'));
  el.addEventListener('drop', e => {
    e.preventDefault(); el.classList.remove('drag');
    if(el.classList.contains('disabled')) return;
    onFiles(e.dataTransfer.files);
  });
  // clicking area (not button) also triggers input
  el.addEventListener('click', e => {
    if(el.classList.contains('disabled') || e.target.tagName==='BUTTON') return;
    el.querySelector('button')?.click();
  });
}

setupDrop(document.getElementById('histDrop'), loadHistFiles);
setupDrop(document.getElementById('newDrop'),  files => { if(files.length) loadNewFile(files[0]); });

document.getElementById('histInput').addEventListener('change', e => {
  if(e.target.files.length) loadHistFiles(e.target.files);
  e.target.value = '';
});
document.getElementById('newInput').addEventListener('change', e => {
  if(e.target.files.length) loadNewFile(e.target.files[0]);
  e.target.value = '';
});

// ════════════════════════════════════════
//  TOAST + THEME
// ════════════════════════════════════════
let _toastTimer = null;
function showToast(msg, err=false){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (err ? ' err' : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.className = '', 2800);
}

function toggleTheme(){
  const light = document.documentElement.getAttribute('data-theme') === 'light';
  document.documentElement.setAttribute('data-theme', light ? '' : 'light');
  document.getElementById('btnTheme').textContent = light ? '☀' : '☾';
  localStorage.setItem('edi-xcheck-theme', light ? '' : 'light');
}
(() => {
  const saved = localStorage.getItem('edi-xcheck-theme');
  if(saved === 'light'){
    document.documentElement.setAttribute('data-theme', 'light');
    document.getElementById('btnTheme').textContent = '☾';
  }
})();

// Bootstrap: attempt to load prebuilt OEVSV baseline. Silent fallback if absent
// (e.g. file:// CORS, missing file). Async — does not block page interactivity.
loadBaseline();
</script>
